<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily Duas Portal</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
body {
  background: radial-gradient(circle at bottom, #064e3b, #022c22 90%);
  min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center;
  justify-content: center; overflow: hidden; padding: 20px;
}
/* Shimmering Oasis Light Rays Animation */
.aurora { position: fixed; inset: 0; z-index: 0; display: flex; justify-content: space-around; opacity: 0.15; }
.ray {
  width: 80px; height: 150%; background: linear-gradient(to top, #10b981, transparent);
  transform: rotate(-15deg); animation: surge 8s ease-in-out infinite alternate;
}
.ray:nth-child(2) { animation-delay: -3s; width: 120px; }
.ray:nth-child(3) { animation-delay: -6s; width: 60px; }
@keyframes surge { 0% { transform: rotate(-10deg) translateY(50px); } 100% { transform: rotate(-20deg) translateY(-50px); } }

.back-btn {
  position: absolute; top: 30px; left: 30px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px;
  border-radius: 12px; cursor: pointer; font-weight: bold; z-index: 10;
}
.container { position: relative; z-index: 5; text-align: center; }
h1 { font-size: 3.2rem; margin-bottom: 40px; color: #34d399; text-shadow: 0 0 25px rgba(52,211,153,0.5); }

.dua-holder {
  width: 320px; height: 420px; background: rgba(2, 44, 34, 0.85);
  border: 3px solid #10b981; border-radius: 32px; padding: 40px;
  display: flex; flex-direction: column; justify-content: space-between;
  align-items: center; box-shadow: 0 25px 50px rgba(0,0,0,0.7);
}
.icon { font-size: 5rem; filter: drop-shadow(0 0 15px rgba(16,185,129,0.4)); }
.title { font-size: 2.2rem; font-weight: 800; }
.badge { background: #065f46; border: 1px solid #34d399; padding: 8px 16px; border-radius: 15px; font-weight: bold; }
</style>
</head>
<body>

<div class="aurora"><div class="ray"></div><div class="ray"></div><div class="ray"></div></div>
<button class="back-btn" onclick="window.location.href='../index.html'">← Portal Hub</button>

<div class="container">
  <h1>Supplications</h1>
  <div class="dua-holder">
    <div class="icon">🤲</div>
    <div class="title">Daily Duas</div>
    <div class="badge">🎙️ RECORDING SOON</div>
  </div>
</div>

<script>
document.addEventListener("keydown", (e) => {
  if(e.key === "Backspace" || e.key === "Escape") { window.location.href="../index.html"; }
});
</script>
</body>
</html>
