<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Duas</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; user-select: none; }
body {
  background: radial-gradient(circle at bottom, #064e3b, #022c22 95%);
  min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 4vh;
}
.bg-image { position: fixed; inset: 0; background: url('duas.jpeg') center/cover no-repeat; opacity: 0.3; z-index: 0; }
canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

.back-btn {
  position: absolute; top: 4vh; left: 4vw; background: rgba(239, 68, 68, 0.95);
  border: 4px solid white; color: white; padding: 2vh 4vw; font-size: 3.5vh;
  border-radius: 2vh; cursor: pointer; font-weight: 900; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
.container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
h1 { font-size: 6vh; margin-bottom: 5vh; color: #34d399; text-shadow: 0 0 25px rgba(52,211,153,0.6); }

.dua-holder {
  width: 50vw; max-width: 600px; height: 45vh; background: rgba(2, 44, 34, 0.9);
  border: 5px solid #10b981; border-radius: 4vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; padding: 4vh; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
}
.icon-box {
  width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; font-size: 16vh; margin-bottom: 2vh;
}
.title { font-size: 5vh; font-weight: 900; color: white; text-align: center; }
</style>
</head>
<body>

<div class="bg-image"></div>
<canvas id="auroraCanvas"></canvas>
<button class="back-btn" onclick="window.location.href='../index.html'">← BACK</button>

<div class="container">
  <h1>Dua</h1>
  <div class="dua-holder">
    <div class="icon-box" id="duaIcon">🤲</div>
    <div class="title">Duas</div>
  </div>
</div>

<script>
// Verify if the background picture asset is found locally, otherwise use fallback emoji sizing
const imgCheck = new Image();
imgCheck.src = 'duas.jpeg';
imgCheck.onload = () => {
  const box = document.getElementById('duaIcon');
  box.style.backgroundImage = "url('duas.jpeg')";
  box.style.backgroundSize = "contain";
  box.style.backgroundPosition = "center";
  box.style.backgroundRepeat = "no-repeat";
  box.textContent = ""; 
};

document.addEventListener("keydown", (e) => {
  if(e.key === "Backspace" || e.key === "Escape") { window.location.href="../index.html"; }
});

const canvas = document.getElementById('auroraCanvas');
const ctx = canvas.getContext('2d');
let lines = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

for(let i=0; i<10; i++) {
  lines.push({ x: Math.random()*canvas.width, w: Math.random()*80+50, s: Math.random()*0.6+0.3, o: Math.random()*Math.PI });
}
function anim() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  lines.forEach(l => {
    l.o += 0.006;
    let alpha = (Math.sin(l.o) + 1) / 2 * 0.3;
    ctx.fillStyle = `rgba(16, 185, 129, ${alpha})`;
    ctx.fillRect(l.x, 0, l.w, canvas.height);
    l.x += l.s; if(l.x > canvas.width) l.x = -l.w;
  });
  requestAnimationFrame(anim);
}
anim();
</script>
</body>
</html>
