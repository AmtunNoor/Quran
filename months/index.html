<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Islamic Months</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; user-select: none; }
body {
  background: radial-gradient(circle at top, #1e3a8a, #030712 95%);
  min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 4vh;
}
.bg-image { position: fixed; inset: 0; background: url('months.jpeg') center/cover no-repeat; opacity: 0.35; z-index: 0; }
canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

.back-btn {
  position: absolute; top: 4vh; left: 4vw; background: rgba(239, 68, 68, 0.95);
  border: 4px solid white; color: white; padding: 2vh 4vw; font-size: 3.5vh;
  border-radius: 2vh; cursor: pointer; font-weight: 900; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
.container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
h1 { font-size: 6vh; margin-bottom: 5vh; color: #38bdf8; text-shadow: 0 0 25px rgba(56,189,248,0.6); }

.showcase-card {
  width: 50vw; max-width: 600px; height: 45vh; background: rgba(15, 23, 42, 0.85);
  border: 5px solid #38bdf8; border-radius: 4vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; padding: 4vh; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
}
.icon { font-size: 16vh; display: flex; align-items: center; justify-content: center; flex: 1; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2vh); } }
.title { font-size: 5vh; font-weight: 900; color: white; margin-top: auto; }
</style>
</head>
<body>

<div class="bg-image"></div>
<canvas id="dustCanvas"></canvas>
<button class="back-btn" onclick="window.location.href='../index.html'">← BACK</button>

<div class="container">
  <h1>Islamic Months</h1>
  <div class="showcase-card" onclick="togglePlay()">
    <div class="icon">📅</div>
    <div class="title">12 Months</div>
  </div>
</div>

<script>
let audio = null;
function togglePlay() {
  if(!audio) { audio = new Audio("months.mp3"); audio.loop = true; }
  if(audio.paused) { audio.play(); } else { audio.pause(); }
}
document.addEventListener("keydown", (e) => {
  if(e.key === "Enter" || e.key === " ") { togglePlay(); }
  else if(e.key === "Backspace" || e.key === "Escape") { window.location.href="../index.html"; }
});

const canvas = document.getElementById('dustCanvas');
const ctx = canvas.getContext('2d');
let pts = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

for(let i=0; i<60; i++) {
  pts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*7+4, s: Math.random()*2+1 });
}
function anim() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'rgba(56, 189, 248, 0.5)';
  pts.forEach(p => {
    p.x += p.s; if(p.x > canvas.width + 10) p.x = -10;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  requestAnimationFrame(anim);
}
anim();
</script>
</body>
</html>
