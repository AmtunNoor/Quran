<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Islamic Months</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
body {
  background: radial-gradient(circle at top, #1e3a8a, #030712 90%);
  min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center;
  justify-content: center; overflow: hidden; padding: 20px;
}
/* Drifting Dust Particle Mechanics */
.dust-field { position: fixed; inset: 0; z-index: 0; }
.particle {
  position: absolute; background: rgba(56, 189, 248, 0.4); border-radius: 50%;
  animation: drift 12s linear infinite;
}
@keyframes drift {
  0% { transform: translateX(-10vw) translateY(0px); opacity: 0; }
  50% { opacity: 0.8; }
  100% { transform: translateX(110vw) translateY(-60px); opacity: 0; }
}

.back-btn {
  position: absolute; top: 30px; left: 30px; background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px;
  border-radius: 12px; cursor: pointer; font-weight: bold; z-index: 10;
}
.container { position: relative; z-index: 5; text-align: center; }
h1 { font-size: 3.2rem; margin-bottom: 40px; color: #38bdf8; text-shadow: 0 0 25px rgba(56,189,248,0.5); }

.showcase-card {
  width: 320px; height: 420px; background: rgba(15, 23, 42, 0.7);
  border: 3px solid #38bdf8; border-radius: 32px; padding: 40px;
  display: flex; flex-direction: column; justify-content: space-between;
  align-items: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
  transition: transform 0.3s ease; cursor: pointer;
}
.showcase-card:hover { transform: scale(1.03); }
.icon { font-size: 5rem; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.title { font-size: 2.2rem; font-weight: 800; color: white; }
.action-tag { font-size: 1rem; color: #38bdf8; font-weight: bold; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="dust-field" id="dust"></div>
<button class="back-btn" onclick="window.location.href='../index.html'">← Portal Hub</button>

<div class="container">
  <h1>Islamic Months</h1>
  <div class="showcase-card" onclick="togglePlay()">
    <div class="icon">📅</div>
    <div class="title">12 Months</div>
    <div class="action-tag" id="statusLabel">▶ PRESS OK TO LISTEN</div>
  </div>
</div>

<script>
let audio = null;
function togglePlay() {
  if(!audio) {
    audio = new Audio("months.mp3");
    audio.onended = () => { document.getElementById("statusLabel").textContent = "▶ PRESS OK TO LISTEN"; };
  }
  if(audio.paused) {
    audio.play(); document.getElementById("statusLabel").textContent = "⏸ TRACK PLAYING";
  } else {
    audio.pause(); document.getElementById("statusLabel").textContent = "▶ TRACK PAUSED";
  }
}
document.addEventListener("keydown", (e) => {
  if(e.key === "Enter" || e.key === " ") { togglePlay(); }
  else if(e.key === "Backspace" || e.key === "Escape") { window.location.href="../index.html"; }
});

const df = document.getElementById("dust");
for(let i=0; i<15; i++) {
  const p = document.createElement("div"); p.className = "particle";
  p.style.width = p.style.height = (Math.random() * 4 + 3) + "px";
  p.style.top = (Math.random() * 90) + "vh"; p.style.animationDelay = (Math.random() * 8) + "s";
  df.appendChild(p);
}
</script>
</body>
</html>
