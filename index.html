<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prism Quran Engine</title>

<style>

/* ================= YOUR UI PRESERVED ================= */
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#0b1b3a,#020617);
color:white;
overflow:hidden;
}

h1{text-align:center}
.subtitle{text-align:center}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
padding:12px;
height:calc(100vh - 180px);
overflow:auto;
}

.card{
padding:14px;
border-radius:16px;
background:#1e293b;
cursor:pointer;
position:relative;
}

.badge{
position:absolute;
top:8px;
right:8px;
background:gold;
color:black;
padding:3px 6px;
border-radius:8px;
font-size:11px;
}

/* ================= ACTIVE ================= */
.active{
outline:3px solid #fff;
transform:scale(1.03);
}

.focus{
outline:4px solid yellow;
}

/* ================= CONTROLS ================= */
.controls{
position:fixed;
bottom:60px;
width:100%;
display:flex;
justify-content:center;
gap:10px;
}

</style>
</head>

<body>

<!-- YOUR HEADER (UNCHANGED) -->
<h1>🌙 Mariam & Hamza's 🌙</h1>
<p class="subtitle">✨Quran Adventures with Mom!✨</p>

<div class="grid" id="grid"></div>

<div class="controls">
<select id="mode">
<option value="listen">🎧 Listen</option>
<option value="5x">🔁 5x Learn</option>
<option value="hifz">🧠 Hifz</option>
</select>

<button onclick="stop()">Stop</button>
</div>

<audio id="audio"></audio>

<script>

/* ================= DATA ================= */
let menu=[];
let map={};
let focusIndex=0;
let current=null;

fetch("menu.json")
.then(r=>r.json())
.then(d=>{
menu=d;
render();
});

/* ================= RENDER ================= */
function render(){
const g=document.getElementById("grid");
g.innerHTML="";

menu.forEach(cat=>{
cat.syncFiles?.forEach(file=>{

if(!file.path.endsWith(".mp3")) return;

let id=file.path.split("/").pop().replace(".mp3","");

map[id]=file;

const card=document.createElement("div");
card.className="card";
card.innerHTML=`${id}`;

if(cat.learn?.[id]){
card.innerHTML+=`<div class="badge">🎓 Learn</div>`;
}

card.onclick=()=>play(id,cat);

g.appendChild(card);
});
});

updateFocus();
}

/* ================= PLAY ENGINE ================= */
function play(id,cat){

const audio=document.getElementById("audio");
const mode=document.getElementById("mode").value;

let file=map[id];

audio.src=file.url || file.path;
audio.play();

/* ---------------- 5X MODE ---------------- */
if(mode==="5x"){
let count=0;
audio.onended=()=>{
if(count<4){
count++;
audio.currentTime=0;
audio.play();
}
};
}

/* ---------------- HIFZ MODE ---------------- */
if(mode==="hifz"){
audio.playbackRate=0.85;
}

/* ---------------- LEARN MODE ---------------- */
if(cat?.learn?.[id]){
let slices=cat.learn[id].slices || [];

let i=0;

audio.ontimeupdate=()=>{

if(i<slices.length && audio.currentTime>=slices[i]){
audio.pause();

setTimeout(()=>{
audio.play();
},1000);

i++;
}
};
}

}

/* ================= STOP ================= */
function stop(){
let a=document.getElementById("audio");
a.pause();
a.currentTime=0;
}

/* ================= TV / KEYBOARD / MOBILE NAV ================= */
document.addEventListener("keydown",(e)=>{

const cards=document.querySelectorAll(".card");

if(e.key==="ArrowRight"){
focusIndex=Math.min(cards.length-1,focusIndex+1);
}

if(e.key==="ArrowLeft"){
focusIndex=Math.max(0,focusIndex-1);
}

if(e.key==="ArrowDown"){
focusIndex=Math.min(cards.length-1,focusIndex+4);
}

if(e.key==="ArrowUp"){
focusIndex=Math.max(0,focusIndex-4);
}

if(e.key==="Enter"){
cards[focusIndex]?.click();
}

updateFocus();
});

/* ================= TOUCH ================= */
document.addEventListener("touchstart",()=>{});

/* ================= FOCUS ================= */
function updateFocus(){
const cards=document.querySelectorAll(".card");

cards.forEach(c=>c.classList.remove("focus"));

if(cards[focusIndex]){
cards[focusIndex].classList.add("focus");
}
}

</script>

</body>
</html>
