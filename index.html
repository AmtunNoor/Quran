<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Quran Corner</title>
<meta name="theme-color" content="#0f172a"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
background:radial-gradient(circle at top,#172554,#020617 70%);
min-height:100vh;
overflow-x:hidden;
color:white;
padding:20px;
}

.stars{position:fixed;inset:0;overflow:hidden;z-index:-1;}
.star{position:absolute;width:3px;height:3px;background:white;border-radius:50%;
animation:twinkle 3s infinite alternate;}

@keyframes twinkle{
from{opacity:.2;transform:scale(.5);}
to{opacity:1;transform:scale(1.5);}
}

h1{
text-align:center;
font-size:2.5rem;
margin-bottom:8px;
background:linear-gradient(90deg,#facc15,#38bdf8,#f472b6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #38bdf8);}
to{filter:drop-shadow(0 0 18px #f472b6);}
}

.subtitle{text-align:center;margin-bottom:28px;color:#cbd5e1;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:18px;
max-width:1300px;
margin:auto;
}

.card{
position:relative;
overflow:hidden;
border-radius:28px;
padding:18px;
min-height:210px; I 
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
transition:.3s;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,255,255,.1);
animation:float 4s ease-in-out infinite;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 30px rgba(255,255,255,.35);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.emoji{font-size:2rem;margin-bottom:12px;}
.arabic{font-size:1.8rem;font-weight:bold;margin-bottom:6px;}
.english{font-size:1rem;opacity:.95;}

.play-btn{
margin-top:18px;
border:none;
border-radius:18px;
padding:12px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
}

.active-tile{
box-shadow:0 0 25px 6px rgba(255,255,255,.7)!important;
transform:scale(1.05);
}

.topbar{
display:flex;justify-content:center;gap:12px;margin-bottom:25px;flex-wrap:wrap;
}

.topbar button{
border:none;padding:12px 16px;border-radius:18px;font-weight:bold;
background:linear-gradient(90deg,#facc15,#fde68a);
}

#overlay{
position:fixed;inset:0;display:none;align-items:center;justify-content:center;
background:rgba(0,0,0,.8);z-index:999;
}

#overlay div{
background:white;color:black;padding:22px;border-radius:20px;
font-size:1.2rem;font-weight:bold;text-align:center;
}

audio{display:none;}

.footer{
margin-top:35px;text-align:center;color:#94a3b8;font-size:.9rem;
}
</style>
</head>

<body>

<div class="stars"></div>

<h1>🌙 Mariam & Hamza's</h1>
<p class="subtitle">Quran Adventure with Mom! ✨</p>

<div class="topbar">
<button onclick="stopAll()">⏹ Stop</button>
<button onclick="toggleLoopAll()" id="loopBtn">🔁 Loop OFF</button>
</div>

<div class="grid" id="grid"></div>

<div id="overlay">
<div>▶ Tap Anywhere To Start</div>
</div>

<div class="footer">Made with 💖 for little Muslims</div>

<script>

/* =========================
DATA
========================= */

const surahs=[
{id:"A1",name:"الفاتحة",eng:"Al Fatiha",emoji:"🌟",file:"A5.mp3",color:"linear-gradient(135deg,#f59e0b,#ef4444)"},
{id:"A2",name:"الإخلاص",eng:"Al Ikhlas",emoji:"💖",file:"A6.mp3",color:"linear-gradient(135deg,#ec4899,#8b5cf6)"},
{id:"A3",name:"الفلق",eng:"Al Falaq",emoji:"🌙",file:"A7.mp3",color:"linear-gradient(135deg,#06b6d4,#3b82f6)"},
{id:"A4",name:"الناس",eng:"An Naas",emoji:"⭐",file:"A8.mp3",color:"linear-gradient(135deg,#10b981,#14b8a6)"}
];

const grid=document.getElementById("grid");

let currentAudio=null;
let currentButton=null;
let currentCard=null;
let pending=null;

const map={};

/* =========================
VOICE (SAFE)
========================= */

function speak(text){
try{
const u=new SpeechSynthesisUtterance(text);
u.rate=0.9;
u.lang="en-US";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}catch(e){}
}

/* =========================
RENDER
========================= */

surahs.forEach(s=>{

const card=document.createElement("div");
card.className="card";
card.style.background=s.color;

card.innerHTML=`
<div>
<div class="emoji">${s.emoji}</div>
<div class="arabic">${s.name}</div>
<div class="english">${s.eng}</div>
</div>
<button class="play-btn">▶ Play</button>
<audio src="${s.file}" preload="auto"></audio>
`;

const btn=card.querySelector("button");
const audio=card.querySelector("audio");

map[s.id]={card,audio,btn,s};

btn.onclick=()=>play(s.id);

grid.appendChild(card);

});

/* =========================
PLAY
========================= */

function play(id){

const item=map[id];
if(!item)return;

if(currentAudio && currentAudio!==item.audio){
currentAudio.pause();
currentAudio.currentTime=0;
if(currentCard)currentCard.classList.remove("active-tile");
}

item.audio.play();

item.card.classList.add("active-tile");

currentAudio=item.audio;
currentButton=item.btn;
currentCard=item.card;

speak(item.s.name);
}

/* =========================
🔒 LOCK MODE QR FIX
========================= */

function qrFix(){

const id=new URLSearchParams(location.search).get("surah");
if(!id || !map[id])return;

const item=map[id];

/* wait FULL paint cycle */
requestAnimationFrame(()=>{

requestAnimationFrame(()=>{

item.card.classList.add("active-tile");

item.card.scrollIntoView({
behavior:"smooth",
block:"center"
});

currentCard=item.card;
currentAudio=item.audio;
currentButton=item.btn;

/* overlay */
document.getElementById("overlay").style.display="flex";

/* voice */
setTimeout(()=>speak(item.s.name),600);

});

});

}

window.addEventListener("load",qrFix);

/* =========================
OVERLAY
========================= */

document.getElementById("overlay").onclick=()=>{

const id=new URLSearchParams(location.search).get("surah");
if(id && map[id]) play(id);

document.getElementById("overlay").style.display="none";
};

/* =========================
CONTROLS
========================= */

function stopAll(){
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime=0;
}
if(currentCard)currentCard.classList.remove("active-tile");
}

function toggleLoopAll(){
const b=document.getElementById("loopBtn");
b.innerText=b.innerText.includes("OFF")?"🔁 Loop ON":"🔁 Loop OFF";
if(currentAudio)currentAudio.loop=!currentAudio.loop;
}

/* =========================
STARS
========================= */

const stars=document.querySelector(".stars");
for(let i=0;i<60;i++){
const d=document.createElement("div");
d.className="star";
d.style.left=Math.random()*100+"%";
d.style.top=Math.random()*100+"%";
stars.appendChild(d);
}

</script>

</body>
</html>
