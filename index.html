<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My Little Quran Corner!</title>
<meta name="theme-color" content="#0f172a"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
body { background:radial-gradient(circle at top,#172554,#020617 70%); min-height:100vh; color:white; padding:20px; display:flex; flex-direction:column; padding-bottom:110px; overflow-x:hidden; }

/* MAIN DASHBOARD HOMEPAGE GRIDS */
.dashboard-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:25px; width:100%; max-width:1400px; margin:30px auto; }
.app-card { position:relative; height:42vh; min-height:260px; border-radius:20px; cursor:pointer; overflow:hidden; background-size:cover; background-position:center; background-repeat:no-repeat; border:3px solid rgba(255,255,255,0.15); box-shadow:0 15px 35px rgba(0,0,0,0.5); transition:transform 0.3s, border-color 0.3s; display:flex; flex-direction:column; justify-content:flex-end; padding:25px; }
.app-card[data-module="quran"] { background-image:url('quran.jpeg'); border-bottom:6px solid #ef4444; }
.app-card[data-module="salah"] { background-image:url('salah/salah.jpeg'); border-bottom:6px solid #a855f7; }
.app-card[data-module="months"] { background-image:url('months/months.jpeg'); border-bottom:6px solid #3b82f6; }
.app-card[data-module="duas"] { background-image:url('duas/duas.jpeg'); border-bottom:6px solid #10b981; }
.app-card[data-module="names"] { background-image:url('names/names.jpeg'); border-bottom:6px solid #f59e0b; }
.app-card:hover { transform:translateY(-5px); border-color:rgba(255,255,255,0.4); }
.card-title { font-size:28px; font-weight:bold; text-align:center; width:100%; text-shadow:0 3px 8px rgba(0,0,0,0.9); z-index:2; }
.homepage-hifz-badge { position:absolute; top:15px; right:15px; background:#eab308; color:#020617; padding:5px 12px; border-radius:8px; font-weight:bold; font-size:14px; z-index:2; }

/* VIEW CONTAINERS */
.sub-view-container { display:none; width:100%; max-width:1300px; margin:0 auto; z-index:10; position:relative; }
.nav-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
.back-btn { background:#ef4444; border:2px solid white; color:white; padding:10px 20px; font-weight:bold; border-radius:10px; cursor:pointer; }

/* STRATEGY CONTROLLERS */
.control-panel { display:flex; gap:15px; margin-bottom:25px; justify-content:center; flex-wrap:wrap; }
.mode-btn { background:#1e293b; border:2px solid rgba(255,255,255,0.2); color:white; padding:12px 24px; font-size:18px; font-weight:bold; border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:8px; }
.mode-btn.active { background:#3b82f6; border-color:white; box-shadow:0 0 15px rgba(59,130,246,0.5); }
.mode-btn.hifz-active { background:#eab308; color:#020617; border-color:white; box-shadow:0 0 15px #eab308; }

/* NO BACKGROUND OVERLAY TRANSPARENCY MASK ON SELECTION TILES */
.tiles-container-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:20px; margin-bottom:30px; }
.interactive-tile { position:relative; border:3px solid rgba(255,255,255,0.15); border-radius:24px; padding:20px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; min-height:120px; transition: transform 0.2s, border-color 0.2s; background-size: cover; background-position: center; }
.interactive-tile.active-tile { border-color:#ffffff; box-shadow:0 0 25px rgba(255,255,255,0.6); transform:scale(1.02); }

/* DIMENSIONAL LOCKS - Eliminates vertical translation slicing of elements */
.tile-left { display:flex; align-items:center; gap:15px; min-width:0; flex-shrink:0; }
.tile-emoji { font-size:36px; width:50px; height:50px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tile-english { font-size:19px; font-weight:bold; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; }
.tile-arabic { font-size:24px; font-weight:bold; color:#facc15; white-space:nowrap; text-align:right; flex-shrink:0; margin-left:auto; }
.tile-top-badge { position:absolute; top:-8px; right:-5px; background:#eab308; color:#020617; font-size:12px; padding:2px 6px; border-radius:5px; font-weight:bold; z-index:5; }

/* IMMUTABLE PLAYBAR */
.fixed-playbar { position:fixed; bottom:0; left:0; right:0; background:#1e293b; padding:20px; border-top:3px solid #3b82f6; display:flex; justify-content:center; align-items:center; gap:30px; z-index:100; }
.playbar-text { font-size:22px; font-weight:bold; color:#facc15; min-width:270px; text-align:center; }
.playbar-ctrl { background:#3b82f6; border:none; color:white; padding:12px 25px; font-size:18px; font-weight:bold; border-radius:8px; cursor:pointer; }
.playbar-ctrl.play-main { background:#10b981; }

.stars { position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
.star { position:absolute; width:3px; height:3px; background:white; border-radius:50%; opacity:0.5; }
#overlay { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); z-index:999; }
#overlay div { background:white; color:black; padding:22px; border-radius:20px; font-size:1.2rem; font-weight:bold; text-align:center; cursor:pointer; box-shadow:0 0 25px rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="stars"></div>
<div id="overlay"><div>▶ Tap Anywhere To Start Audio</div></div>

<div id="mainDashboardView">
  <h1 style="text-align:center; font-size:38px; margin-top:20px; background:linear-gradient(90deg,#facc15,#38bdf8); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:bold;">🌙 My Little Quran Corner 🌙</h1>
  <div class="dashboard-grid">
    <div class="app-card" data-module="quran" onclick="switchActiveView('quran')">
      <div class="homepage-hifz-badge">🎓 HIFZ</div>
      <div class="card-title">Quran</div>
    </div>
    <div class="app-card" data-module="salah" onclick="location.href='salah/SalahStepsIndex.html'">
      <div class="card-title">Salah</div>
    </div>
    <div class="app-card" data-module="months" onclick="location.href='months/index.html'">
      <div class="card-title">Months</div>
    </div>
    <div class="app-card" data-module="duas" onclick="location.href='duas/index.html'">
      <div class="card-title">Dua</div>
    </div>
    <div class="app-card" data-module="names" onclick="switchActiveView('names')">
      <div class="homepage-hifz-badge">🎓 HIFZ</div>
      <div class="card-title">Asma-ul-Husna</div>
    </div>
  </div>
</div>

<div id="quranView" class="sub-view-container">
  <div class="nav-header">
    <button class="back-btn" onclick="exitSubViewToHome()">← MENU</button>
    <h2>📖 QURAN SELECTION PANEL</h2>
    <div style="width:70px;"></div>
  </div>
  <div class="control-panel">
    <button class="mode-btn active" id="qBtnListen" onclick="toggleSubsystemControlMode('listen')">🎧 Listen Mode</button>
    <button class="mode-btn" id="qBtnLearn" onclick="toggleSubsystemControlMode('learn')">🎓 Learn Mode</button>
  </div>
  <div class="control-panel">
    <button class="mode-btn" id="qLoopBtn" onclick="toggleQuranContinuousLoopState()">🔁 Loop: Off</button>
    <button class="mode-btn" id="qSubLearnBtn" style="display:none;" onclick="toggleQuranLearnBranch('5x')">🔁 Learn 5x</button>
    <button class="mode-btn" id="qSubHifzBtn" style="display:none;" onclick="toggleQuranLearnBranch('hifz')">🧠 Hifz</button>
  </div>
  <div class="tiles-container-grid" id="quranGridInjectedContainer"></div>
</div>

<div id="namesView" class="sub-view-container">
  <div class="nav-header">
    <button class="back-btn" onclick="exitSubViewToHome()">← MENU</button>
    <h2>✨ ASMA-UL-HUSNA SYSTEM</h2>
    <div style="width:70px;"></div>
  </div>
  <div class="control-panel">
    <button class="mode-btn active" id="nBtnLoop" onclick="toggleNamesControlMode('loop')">🔄 LOOP ON</button>
    <button class="mode-btn" id="nBtnHifz" onclick="toggleNamesControlMode('hifz')">🎓 HIFZ MODE</button>
  </div>
  <div class="tiles-container-grid" id="namesGridInjectedContainer"></div>
</div>

<div class="fixed-playbar" id="globalPlaybar" style="display:none;">
  <button class="playbar-ctrl" onclick="triggerNavigationPrevious()">&lt; PREV</button>
  <button class="playbar-ctrl play-main" id="masterPlayPauseBtn" onclick="triggerPlaybackToggle()">▶ PLAY</button>
  <button class="playbar-ctrl" onclick="triggerNavigationNext()">NEXT &gt;</button>
  <div class="playbar-text" id="masterStatusText">Select a Track</div>
</div>

<script>
/* CORE DATA AND RUNTIME COMPONENT ENGINE VARIABLES */
let dbQuran = {};
let dbNames = {};
let activeSubModule = "";
let htmlMediaElement = null;

let qActiveId = "";
let qEngineMode = "listen"; 
let qLoopActive = false;    
let qLearnSubStrategy = "5x"; 
let qSliceIndex = 0;
let qSliceCounter = 0;

let nActiveId = "";
let nEngineMode = "loop";   
let nHifzClockWorker = null;
let nSliceIndex = 0;
let nSliceCounter = 0;

/* ONLOAD ENGINE ASYNC DEEP INITIALIZATION */
fetch('menu.json')
  .then(res => res.json())
  .then(payload => {
    const quranDataNode = payload.find(item => item.title === "Quran");
    const namesDataNode = payload.find(item => item.title === "Asma-ul-Husna");
    
    if(quranDataNode) dbQuran = quranDataNode.meta || {};
    if(namesDataNode) dbNames = namesDataNode.meta || {};
    
    verifyDeepLinkParameters();
  });

function verifyDeepLinkParameters() {
  const urlParams = new URLSearchParams(window.location.search);
  const targetId = urlParams.get("id") || urlParams.get("surah");
  if(targetId) {
    if (dbQuran[targetId]) {
      switchActiveView('quran');
      processTargetTrackSelection(targetId);
      document.getElementById("overlay").style.display = "flex";
    }
  }
}

document.getElementById("overlay").onclick = () => {
  document.getElementById("overlay").style.display = "none";
  if(htmlMediaElement) htmlMediaElement.play().catch(() => {});
};

function switchActiveView(viewName) {
  activeSubModule = viewName;
  document.getElementById('mainDashboardView').style.display = 'none';
  document.getElementById('globalPlaybar').style.display = 'flex';
  
  if(viewName === 'quran') {
    document.getElementById('quranView').style.display = 'block';
    document.getElementById('namesView').style.display = 'none';
    generateQuranTilesUI();
    if(!qActiveId) processTargetTrackSelection(Object.keys(dbQuran)[0]);
  } else if(viewName === 'names') {
    document.getElementById('quranView').style.display = 'none';
    document.getElementById('namesView').style.display = 'block';
    generateNamesTilesUI();
    if(!nActiveId) processTargetTrackSelection(Object.keys(dbNames)[0]);
  }
}

function exitSubViewToHome() {
  clearActiveAudioStreams();
  document.getElementById('quranView').style.display = 'none';
  document.getElementById('namesView').style.display = 'none';
  document.getElementById('globalPlaybar').style.display = 'none';
  document.getElementById('mainDashboardView').style.display = 'block';
  activeSubModule = "";
}

function clearActiveAudioStreams() {
  if(htmlMediaElement) { htmlMediaElement.pause(); htmlMediaElement.currentTime = 0; htmlMediaElement = null; }
  clearInterval(nHifzClockWorker);
}

/* ================= GENERIC DATA DRIVEN QURAN BUILDER ================= */
function generateQuranTilesUI() {
  const wrapper = document.getElementById('quranGridInjectedContainer');
  wrapper.innerHTML = "";
  
  Object.keys(dbQuran).forEach(key => {
    const data = dbQuran[key];
    const learnSupport = !!data.learnAudio;
    if(qEngineMode === 'learn' && !learnSupport) return;

    const element = document.createElement('div');
    element.className = `interactive-tile ${key === qActiveId ? 'active-tile' : ''}`;
    element.id = `qItem_${key}`;
    element.style.background = data.color || "linear-gradient(135deg,#1e293b,#0f172a)";
    element.innerHTML = `
      ${(qEngineMode === 'listen' && learnSupport) ? '<div class="tile-top-badge">🎓</div>' : ''}
      <div class="tile-left">
        <div class="tile-emoji">${data.emoji || "📖"}</div>
        <div class="tile-english">${data.englishName || 'Surah ' + key}</div>
      </div>
      <div class="tile-arabic">${data.arabicName || ""}</div>
    `;
    element.onclick = () => processTargetTrackSelection(key);
    wrapper.appendChild(element);
  });
}

function toggleSubsystemControlMode(targetMode) {
  qEngineMode = targetMode;
  document.getElementById('qBtnListen').classList.toggle('active', targetMode === 'listen');
  document.getElementById('qBtnLearn').classList.toggle('active', targetMode === 'learn');
  
  const loopBtn = document.getElementById('qLoopBtn');
  const b5x = document.getElementById('qSubLearnBtn');
  const bHz = document.getElementById('qSubHifzBtn');
  
  if(targetMode === 'learn') {
    loopBtn.style.display = 'none'; b5x.style.display = 'block'; bHz.style.display = 'block';
    toggleQuranLearnBranch(qLearnSubStrategy);
  } else {
    loopBtn.style.display = 'block'; b5x.style.display = 'none'; bHz.style.display = 'none';
  }
  generateQuranTilesUI();
  const options = Object.keys(dbQuran).filter(k => qEngineMode === 'listen' || dbQuran[k].learnAudio);
  processTargetTrackSelection(options.includes(qActiveId) ? qActiveId : options[0]);
}

function toggleQuranContinuousLoopState() {
  qLoopActive = !qLoopActive;
  const btn = document.getElementById('qLoopBtn');
  btn.textContent = qLoopActive ? "🔁 Loop: On" : "🔁 Loop: Off";
  btn.classList.toggle('active', qLoopActive);
  if(htmlMediaElement && qEngineMode === "listen") htmlMediaElement.loop = qLoopActive;
}

function toggleQuranLearnBranch(strategy) {
  qLearnSubStrategy = strategy;
  document.getElementById('qSubLearnBtn').classList.toggle('active', strategy === '5x');
  document.getElementById('qSubHifzBtn').classList.toggle('active', strategy === 'hifz');
  recommitAudioSourceLink();
}

/* ================= GENERIC DATA DRIVEN NAMES BUILDER ================= */
function generateNamesTilesUI() {
  const wrapper = document.getElementById('namesGridInjectedContainer');
  wrapper.innerHTML = "";
  
  Object.keys(dbNames).forEach(key => {
    const data = dbNames[key];
    const element = document.createElement('div');
    element.className = `interactive-tile ${key === nActiveId ? 'active-tile' : ''}`;
    element.id = `nItem_${key}`;
    element.style.background = data.color || "linear-gradient(135deg,#1e293b,#0f172a)";
    element.innerHTML = `
      <div class="tile-left">
        <div class="tile-emoji">${data.emoji || "✨"}</div>
        <div class="tile-english">${data.englishName || ""}</div>
      </div>
      <div class="tile-arabic">${data.arabicName || ""}</div>
    `;
    element.onclick = () => processTargetTrackSelection(key);
    wrapper.appendChild(element);
  });
}

function toggleNamesControlMode(targetMode) {
  nEngineMode = targetMode;
  document.getElementById('nBtnLoop').classList.toggle('active', targetMode === 'loop');
  document.getElementById('nBtnHifz').classList.toggle('hifz-active', targetMode === 'hifz');
  recommitAudioSourceLink();
}

/* ================= TRACK SELECTION ROUTER MECHANISM ================= */
function processTargetTrackSelection(id) {
  if(activeSubModule === 'quran') {
    qActiveId = id;
    document.querySelectorAll('#quranGridInjectedContainer .interactive-tile').forEach(t => t.classList.remove('active-tile'));
    const target = document.getElementById(`qItem_${id}`);
    if(target) target.classList.add('active-tile');
  } else {
    nActiveId = id;
    document.querySelectorAll('#namesGridInjectedContainer .interactive-tile').forEach(t => t.classList.remove('active-tile'));
    const target = document.getElementById(`nItem_${id}`);
    if(target) target.classList.add('active-tile');
  }
  recommitAudioSourceLink();
}

function recommitAudioSourceLink() {
  clearActiveAudioStreams();
  let targetPath = "";
  
  if(activeSubModule === 'quran') {
    const meta = dbQuran[qActiveId];
    if(!meta) return;
    qSliceIndex = 0; qSliceCounter = 0;
    targetPath = (qEngineMode === 'learn' && meta.learnAudio) ? meta.learnAudio : meta.listenAudio;
  } else {
    const meta = dbNames[nActiveId];
    if(!meta) return;
    nSliceIndex = 0; nSliceCounter = 0;
    targetPath = meta.listenAudio;
  }
  
  htmlMediaElement = new Audio(targetPath);
  htmlMediaElement.addEventListener('play', () => document.getElementById('masterPlayPauseBtn').textContent = "⏸ PAUSE");
  htmlMediaElement.addEventListener('pause', () => document.getElementById('masterPlayPauseBtn').textContent = "▶ PLAY");
  
  if(activeSubModule === 'quran') {
    if(qEngineMode === 'listen') {
      htmlMediaElement.loop = qLoopActive;
    } else {
      htmlMediaElement.addEventListener('timeupdate', runQuranSlicingCalculations);
    }
  } else {
    if(nEngineMode === 'loop') {
      htmlMediaElement.loop = true;
    } else {
      htmlMediaElement.addEventListener('loadedmetadata', mountNamesSlicingIntervalEngine);
    }
  }
  
  if (document.getElementById("overlay").style.display !== "flex") {
    htmlMediaElement.play().catch(() => {});
  }
  syncControlBarLabels();
}

/* ================= TIME ENGINES LOOP CALCULATIONS ================= */
function runQuranSlicingCalculations() {
  if(qEngineMode !== 'learn' || !htmlMediaElement) return;
  const limits = dbQuran[qActiveId].ayahStarts;
  if(!limits) return;
  
  const finishTime = (qSliceIndex + 1 < limits.length) ? limits[qSliceIndex + 1] : htmlMediaElement.duration;
  if(htmlMediaElement.currentTime >= finishTime) {
    if(qLearnSubStrategy === '5x') {
      qSliceCounter++;
      if(qSliceCounter < 5) {
        htmlMediaElement.currentTime = limits[qSliceIndex];
        htmlMediaElement.play().catch(() => {});
      } else {
        qSliceCounter = 0;
        if(qSliceIndex + 1 < limits.length) {
          qSliceIndex++;
          htmlMediaElement.currentTime = limits[qSliceIndex];
          htmlMediaElement.play().catch(() => {});
        } else {
          htmlMediaElement.pause();
          qSliceIndex = 0;
        }
      }
    } else {
      htmlMediaElement.currentTime = limits[qSliceIndex];
      htmlMediaElement.play().catch(() => {});
    }
    syncControlBarLabels();
  }
}

function mountNamesSlicingIntervalEngine() {
  if(!htmlMediaElement) return;
  const segmentCount = dbNames[nActiveId].totalSegments || 1;
  const chunkLength = htmlMediaElement.duration / segmentCount;
  
  nHifzClockWorker = setInterval(() => {
    if(!htmlMediaElement || htmlMediaElement.paused) return;
    
    let boundaryStart = nSliceIndex * chunkLength;
    let boundaryEnd = boundaryStart + chunkLength;
    
    if(htmlMediaElement.currentTime >= boundaryEnd || htmlMediaElement.currentTime < boundaryStart) {
      nSliceCounter++;
      if(nSliceCounter >= 5) {
        nSliceCounter = 0;
        nSliceIndex = (nSliceIndex + 1 >= segmentCount) ? 0 : nSliceIndex + 1;
      }
      htmlMediaElement.currentTime = nSliceIndex * chunkLength;
      htmlMediaElement.play().catch(() => {});
      syncControlBarLabels();
    }
  }, 100);
}

/* ================= COMPONENT ACTION HANDLERS ================= */
function triggerPlaybackToggle() {
  if(!htmlMediaElement) return;
  if(htmlMediaElement.paused) {
    if(activeSubModule === 'quran' && qEngineMode === 'learn') {
      const markers = dbQuran[qActiveId].ayahStarts;
      if(htmlMediaElement.currentTime < markers[qSliceIndex]) htmlMediaElement.currentTime = markers[qSliceIndex];
    }
    htmlMediaElement.play().catch(() => {});
  } else {
    htmlMediaElement.pause();
  }
}

function triggerNavigationNext() {
  if(activeSubModule === 'quran') {
    if(qEngineMode === 'listen') { htmlMediaElement.currentTime += 5; } 
    else {
      const markers = dbQuran[qActiveId].ayahStarts;
      if(qSliceIndex + 1 < markers.length) {
        qSliceIndex++; qSliceCounter = 0;
        htmlMediaElement.currentTime = markers[qSliceIndex];
        htmlMediaElement.play().catch(() => {});
        syncControlBarLabels();
      }
    }
  } else {
    if(nEngineMode === 'loop') {
      const arrayKeys = Object.keys(dbNames);
      let nextPos = (arrayKeys.indexOf(nActiveId) + 1) % arrayKeys.length;
      processTargetTrackSelection(arrayKeys[nextPos]);
    } else {
      const totalSegs = dbNames[nActiveId].totalSegments || 1;
      nSliceCounter = 0; nSliceIndex = (nSliceIndex + 1) % totalSegs;
      htmlMediaElement.currentTime = nSliceIndex * (htmlMediaElement.duration / totalSegs);
      htmlMediaElement.play().catch(() => {});
      syncControlBarLabels();
    }
  }
}

function triggerNavigationPrevious() {
  if(activeSubModule === 'quran') {
    if(qEngineMode === 'listen') { htmlMediaElement.currentTime -= 5; } 
    else {
      const markers = dbQuran[qActiveId].ayahStarts;
      if(qSliceIndex - 1 >= 0) {
        qSliceIndex--; qSliceCounter = 0;
        htmlMediaElement.currentTime = markers[qSliceIndex];
        htmlMediaElement.play().catch(() => {});
        syncControlBarLabels();
      }
    }
  } else {
    if(nEngineMode === 'loop') {
      const arrayKeys = Object.keys(dbNames);
      let prevPos = (arrayKeys.indexOf(nActiveId) - 1 + arrayKeys.length) % arrayKeys.length;
      processTargetTrackSelection(arrayKeys[prevPos]);
    } else {
      const totalSegs = dbNames[nActiveId].totalSegments || 1;
      nSliceCounter = 0; nSliceIndex = (nSliceIndex - 1 + totalSegs) % totalSegs;
      htmlMediaElement.currentTime = nSliceIndex * (htmlMediaElement.duration / totalSegs);
      htmlMediaElement.play().catch(() => {});
      syncControlBarLabels();
    }
  }
}

function syncControlBarLabels() {
  const output = document.getElementById('masterStatusText');
  if(activeSubModule === 'quran') {
    const data = dbQuran[qActiveId];
    if(qEngineMode === 'learn') {
      const tag = (qLearnSubStrategy === '5x') ? `(${qSliceCounter + 1}/5)` : `(Hifz Block)`;
      output.textContent = `${data.englishName || qActiveId} - Ayah ${qSliceIndex + 1} ${tag}`;
    } else {
      output.textContent = `${data.englishName || qActiveId} - Continuous`;
    }
  } else {
    const data = dbNames[nActiveId];
    if(nEngineMode === 'hifz') {
      output.textContent = `Slice: ${nSliceIndex + 1}/${data.totalSegments} (${nSliceCounter + 1}/5)`;
    } else {
      output.textContent = `Names Block ${data.englishName} - Continuous`;
    }
  }
}

const starsBox = document.querySelector(".stars");
for(let i=0; i<40; i++){
  const node = document.createElement("div");
  node.className = "star"; node.style.left = Math.random() * 100 + "%"; node.style.top = Math.random() * 100 + "%";
  starsBox.appendChild(node);
}
</script>
</body>
</html>
