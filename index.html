<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Mariam & Hamza's Prism</title>
<meta name="theme-color" content="#0f172a"/>
<link rel="stylesheet" href="styles/prism.css"/>
</head>
<body>
<h1 id="pageTitle">🌙 Mariam & Hamza’s 🌙</h1>
<div id="pageSubtitle">✨Quran Adventures with Mom!✨</div>

<div class="topbar">
<button id="btnBack">🏠 Home</button>
<button id="btnStop">⏹ Stop</button>
<select id="mode"></select>
</div>

<main id="app" class="grid"></main>

<footer class="credits">
<small>Created by</small>
<div class="amtun">AMTUN NOOR</div>
<small>May 2026</small>
</footer>

<script src="engines/quran.engine.js"></script>
<script src="engines/grid.engine.js"></script>
<script src="engines/visual.engine.js"></script>
<script src="engines/story.engine.js"></script>
<script>
const Prism = {
  menu: [],
  current: null,
  items: [],
  focus: 0,
  audio: null,
  timers: [],
  params: new URLSearchParams(location.search),
  els: {},
  engines: window.PrismEngines || {}
};

function setVh(){document.documentElement.style.setProperty("--vh", window.innerHeight+"px")}
setVh(); addEventListener("resize",()=>setTimeout(setVh,80)); addEventListener("orientationchange",()=>setTimeout(setVh,250));

function $(id){return document.getElementById(id)}
Prism.els = {app:$("app"), title:$("pageTitle"), sub:$("pageSubtitle"), back:$("btnBack"), stop:$("btnStop"), mode:$("mode")};

function clearAll(){
  Prism.timers.forEach(t=>clearTimeout(t)); Prism.timers=[];
  if(Prism.audio){try{Prism.audio.pause(); Prism.audio.currentTime=0}catch(e){}}
  Prism.audio=null; Prism.items=[]; Prism.focus=0; Prism.els.app.innerHTML="";
  document.body.className="";
}

function rel(path){return path || ""}
async function fetchJson(path, fallback){
  try{const r=await fetch(path,{cache:"no-store"}); if(r.ok) return await r.json()}catch(e){}
  return fallback;
}

function setHeader(title, sub){
  Prism.els.title.textContent = title || "";
  Prism.els.sub.textContent = sub || "";
}

function setModes(options, value, onchange){
  const m=Prism.els.mode; m.innerHTML="";
  (options||[]).forEach(o=>{
    const opt=document.createElement("option"); opt.value=o.value; opt.textContent=o.label; m.appendChild(opt);
  });
  m.style.display = options && options.length ? "" : "none";
  if(value) m.value=value;
  m.onchange=onchange||null;
}

function showTop(home=true, stop=true){
  Prism.els.back.style.display = home ? "" : "none";
  Prism.els.stop.style.display = stop ? "" : "none";
}

function card(data, onClick){
  const el=document.createElement("div");
  el.className="card";
  el.tabIndex=0;
  if(data.color) el.style.background=data.color;
  if(data.image) el.style.backgroundImage=`linear-gradient(rgba(2,6,23,.08),rgba(2,6,23,.25)),url('${data.image}')`;
  el.innerHTML = `${data.badge?`<div class="badge-learn">${data.badge}</div>`:""}
    <div class="emoji">${data.emoji||"✨"}</div>
    <div class="arabic">${data.name||""}</div>
    <div class="english">${data.eng||""}</div>
    <button class="play-btn">${data.button||"▶ Play"}</button>`;
  el.onclick=onClick;
  Prism.els.app.appendChild(el);
  const item={el,onClick};
  Prism.items.push(item);
  return item;
}

function updateFocus(){
  Prism.items.forEach((it,i)=>it.el.classList.toggle("remote-focus", i===Prism.focus));
  Prism.items[Prism.focus]?.el?.scrollIntoView({block:"nearest",inline:"nearest"});
}

function playAudio(src, opts={}){
  if(!src) return;
  if(Prism.audio){try{Prism.audio.pause()}catch(e){}}
  const a=new Audio(src);
  a.preload="auto";
  Prism.audio=a;
  a.onplay=()=>opts.onplay&&opts.onplay(a);
  a.ontimeupdate=()=>opts.ontimeupdate&&opts.ontimeupdate(a);
  a.onended=()=>opts.onended&&opts.onended(a);
  a.play().catch(()=>{});
  return a;
}

function stopAudio(){ if(Prism.audio){Prism.audio.pause(); Prism.audio.currentTime=0;} }

function renderLanding(){
  clearAll(); setHeader("🌙 Mariam & Hamza’s 🌙","✨Quran Adventures with Mom!✨"); showTop(false,true); setModes([]);
  Prism.els.app.className="grid";
  const sorted=[...Prism.menu].sort((a,b)=>(a.plugin?.priority||99)-(b.plugin?.priority||99));
  sorted.forEach(entry=>{
    const p=entry.plugin||{};
    card({emoji:icon(p.id), name:entry.title, eng:"", image:p.tileImage, color:theme(p.id)},()=>openPlugin(p.id));
  });
  updateFocus();
}

function icon(id){return {quran:"📖",salah:"🕌",dua:"🤲",months:"🗓️",names:"✨","salah-names":"🕌",numbers:"🔢"}[id]||"✨"}
function theme(id){
 const map={quran:"linear-gradient(135deg,#22c55e,#0ea5e9)",salah:"linear-gradient(135deg,#f97316,#facc15)",dua:"linear-gradient(135deg,#ec4899,#8b5cf6)",months:"linear-gradient(135deg,#38bdf8,#06b6d4)",names:"linear-gradient(135deg,#f59e0b,#facc15)",numbers:"linear-gradient(135deg,#a855f7,#ec4899)"};
 return map[id]||"linear-gradient(135deg,#38bdf8,#6366f1)";
}

function pluginEntry(id){return Prism.menu.find(e=>(e.plugin||{}).id===id)}
function openPlugin(id){
  const entry=pluginEntry(id); if(!entry) return renderLanding();
  const p=entry.plugin; Prism.current=p;
  history.replaceState(null,"",`?plugin=${encodeURIComponent(id)}`);
  if(p.engine==="external") return renderExternal(p);
  const renderer=p.renderer || (p.id==="quran"?"quran":p.engine);
  const engine=Prism.engines[renderer] || Prism.engines.grid;
  engine.render(Prism, p, entry);
}

function renderExternal(p){
  clearAll(); document.body.classList.add("stage-page"); setHeader("",""); showTop(true,true); setModes([]);
  Prism.els.app.className="stage-shell";
  Prism.els.app.innerHTML=`<iframe class="external-frame" src="${p.externalUrl||p.mainUrl||""}" allow="autoplay; fullscreen"></iframe>`;
}

Prism.els.back.onclick=()=>{history.replaceState(null,"",location.pathname);renderLanding()};
Prism.els.stop.onclick=()=>stopAudio();

document.addEventListener("keydown",e=>{
  if(!Prism.items.length) return;
  if(["ArrowRight","ArrowDown"].includes(e.key)){Prism.focus=(Prism.focus+1)%Prism.items.length;updateFocus();e.preventDefault()}
  if(["ArrowLeft","ArrowUp"].includes(e.key)){Prism.focus=(Prism.focus-1+Prism.items.length)%Prism.items.length;updateFocus();e.preventDefault()}
  if(e.key==="Enter"){Prism.items[Prism.focus]?.onClick?.();e.preventDefault()}
});

async function boot(){
  Prism.menu = await fetchJson("menu.json", []);
  const plugin=Prism.params.get("plugin");
  if(plugin) openPlugin(plugin); else renderLanding();
}
boot();
</script>
</body>
</html>
