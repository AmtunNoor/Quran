<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>My Little Quran Corner!</title>
<meta name="theme-color" content="#0f172a"/>

<style>
@font-face{
  font-family:"Baloo Bhaijaan 2";
  src:url("BalooBhaijaan2-ExtraBold.ttf");
  font-display:swap;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Baloo Bhaijaan 2","Comic Sans MS","Trebuchet MS",Arial,sans-serif;
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

body{
background:radial-gradient(circle at top,#172554,#020617 70%);
min-height:100vh;
overflow-x:hidden;
color:white;
padding:20px;
padding-bottom:110px;
display:flex;
flex-direction:column;
}

body.tv-mode{
height:100vh;
overflow:hidden;
padding:15px;
padding-top:45px!important;
padding-bottom:95px;
}

body.tv-mode h1{
margin-top:0!important;
font-size:2.8rem!important;
}

body.tv-mode .subtitle{
margin-bottom:20px!important;
}

.stars{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate, drift 25s linear infinite;
}

@keyframes twinkle{
from{opacity:.2;transform:scale(.5);}
to{opacity:1;transform:scale(1.5);}
}

@keyframes drift{
from{transform:translateY(0px);}
to{transform:translateY(-120px);}
}

.sparkle{
position:absolute;
width:2px;
height:2px;
border-radius:50%;
background:white;
opacity:.8;
animation:sparkleFloat 12s linear infinite;
}

@keyframes sparkleFloat{
0%{transform:translateY(40px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-140px);opacity:0;}
}

h1{
text-align:center;
font-size:2.5rem;
margin-bottom:8px;
background:linear-gradient(90deg,#facc15,#38bdf8,#f472b6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate, headerFloat 4s ease-in-out infinite;
display:block;
width:100%;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #38bdf8);}
to{filter:drop-shadow(0 0 18px #f472b6);}
}

@keyframes headerFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.subtitle{
text-align:center;
margin-bottom:24px;
color:#cbd5e1;
animation:headerFloat 4s ease-in-out infinite;
animation-delay:.5s;
}

.topbar{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:25px;
flex-wrap:wrap;
z-index:10;
}

.topbar button,
.topbar select{
border:none;
padding:12px 16px;
border-radius:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#facc15,#fde68a);
}

.topbar button:focus,
.topbar select:focus{
outline:5px solid #fff!important;
outline-offset:2px;
transform:scale(1.05);
}

#btnBack{display:none;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
max-width:none;
width:100%;
margin:auto;
flex:1;
}

@media(max-width:768px){
.grid{grid-template-columns:repeat(2,1fr)!important;}
}

body.tv-mode .grid{
grid-template-rows:repeat(4,1fr);
gap:12px;
padding-top:5px;
margin-bottom:15px;
}

body.landing-mode .grid{
perspective:1200px;
align-items:stretch;
}

body.landing-mode .card{
animation:livingFloat 5s ease-in-out infinite;
transform-style:preserve-3d;
}

body.landing-mode .card:nth-child(2n){animation-delay:.35s;}
body.landing-mode .card:nth-child(3n){animation-delay:.7s;}

@keyframes livingFloat{
0%,100%{transform:translateY(0) rotateX(0deg);}
50%{transform:translateY(-7px) rotateX(2deg);}
}

body.landing-mode .remote-focus{
transform:translateY(-10px) scale(1.08) rotateX(4deg)!important;
box-shadow:0 0 38px rgba(255,255,255,.95),0 18px 35px rgba(0,0,0,.35);
}

body.landing-mode .remote-focus:after{
content:"";
position:absolute;
inset:-3px;
border-radius:30px;
background:linear-gradient(120deg,rgba(255,255,255,.45),transparent,rgba(250,204,21,.45));
z-index:0;
animation:focusShimmer 1.8s linear infinite;
pointer-events:none;
}

@keyframes focusShimmer{
0%{opacity:.25;transform:translateX(-8px);}
50%{opacity:.8;}
100%{opacity:.25;transform:translateX(8px);}
}

.card{
position:relative;
overflow:hidden;
border-radius:28px;
padding:18px;
min-height:210px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
transition:.3s;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,255,255,.1);
animation:float 4s ease-in-out infinite;
height:100%;
width:100%;
background-size:cover!important;
background-position:center!important;
}

.card:before{
content:"";
position:absolute;
inset:0;
background:rgba(2,6,23,.18);
z-index:0;
pointer-events:none;
}

.card>*{position:relative;z-index:1;}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 30px rgba(255,255,255,.35);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.card-info-box{
display:flex;
flex-direction:column;
justify-content:space-between;
height:100%;
width:100%;
}

.emoji{font-size:2.4rem;margin-bottom:8px;}
.arabic{font-size:1.9rem;font-weight:bold;margin-bottom:4px;text-shadow:0 2px 10px rgba(0,0,0,.25);}
.english{font-size:1.05rem;opacity:.95;}

body.landing-mode .card{
align-items:center;
justify-content:center;
text-align:center;
}

body.landing-mode .card-info-box{
height:auto;
justify-content:center;
align-items:center;
gap:12px;
}

body.landing-mode .emoji{font-size:3.2rem;}
body.landing-mode .english{display:none;}

.badge{
position:absolute;
top:12px;
right:12px;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,.9);
color:#020617;
font-size:.8rem;
font-weight:900;
z-index:3;
}

.play-btn{
margin-top:14px;
border:none;
border-radius:18px;
padding:12px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
transition:.3s;
position:relative;
z-index:5;
width:100%;
}

body.landing-mode .play-btn{display:none;}

.active-tile .play-btn{
background:linear-gradient(90deg,#facc15,#fde68a)!important;
color:#020617!important;
}

.active-tile{
box-shadow:0 0 25px 6px rgba(255,255,255,.7)!important;
transform:scale(1.04);
}

.remote-focus{
outline:5px solid #fff;
outline-offset:4px;
transform:scale(1.04);
box-shadow:0 0 30px rgba(255,255,255,.9);
z-index:10;
}

.stage{
position:relative;
width:100%;
min-height:62vh;
border-radius:32px;
overflow:hidden;
background-size:cover!important;
background-position:center!important;
box-shadow:0 0 35px rgba(255,255,255,.18);
display:flex;
align-items:flex-end;
justify-content:center;
padding:24px;
}

.stage-content{
width:min(900px,100%);
text-align:center;
padding:22px;
border-radius:26px;
background:rgba(15,23,42,.45);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,.18);
}

.stage-title{
font-size:clamp(2rem,5vw,4.5rem);
font-weight:900;
margin-bottom:8px;
}

.stage-sub{
font-size:clamp(1.1rem,2.5vw,2rem);
opacity:.95;
}

.stage-badges{
margin-top:18px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

.rakah-badge{
padding:12px 16px;
border-radius:999px;
background:linear-gradient(135deg,#fff7ed,#fde68a);
color:#111827;
font-weight:900;
font-size:clamp(1rem,2vw,1.4rem);
box-shadow:0 0 15px rgba(255,255,255,.4);
animation:badgePop .8s ease;
}

@keyframes badgePop{
0%{transform:scale(.2);opacity:0;}
65%{transform:scale(1.1);opacity:1;}
100%{transform:scale(1);}
}

.story-dawn{background:linear-gradient(rgba(255,182,193,.28),rgba(15,23,42,.35));}
.story-bright-day{background:linear-gradient(rgba(250,204,21,.25),rgba(14,165,233,.18));}
.story-afternoon{background:linear-gradient(rgba(251,146,60,.22),rgba(15,23,42,.28));}
.story-sunset{background:linear-gradient(rgba(249,115,22,.38),rgba(124,45,18,.28));}
.story-night{background:linear-gradient(rgba(30,64,175,.42),rgba(2,6,23,.55));}

.story-overlay{
position:absolute;
inset:0;
pointer-events:none;
z-index:0;
transition:background 1s ease;
}

.spotlight-wrap{
position:relative;
display:flex;
align-items:center;
justify-content:center;
min-height:62vh;
border-radius:32px;
overflow:hidden;
background-size:contain!important;
background-position:center!important;
background-repeat:no-repeat!important;
background-color:rgba(15,23,42,.55);
box-shadow:0 0 35px rgba(255,255,255,.18);
}

.spotlight-number{
position:absolute;
font-size:clamp(4rem,15vw,11rem);
font-weight:900;
text-shadow:0 0 22px rgba(250,204,21,.9);
animation:spotlightPop 1.2s ease;
}

@keyframes spotlightPop{
0%{transform:scale(.35);opacity:0;}
50%{transform:scale(1.25);opacity:1;}
100%{transform:scale(1);opacity:1;}
}

.bubble{
position:absolute;
width:44px;
height:44px;
border-radius:50%;
background:rgba(255,255,255,.22);
box-shadow:inset 0 0 12px rgba(255,255,255,.35),0 0 18px rgba(255,255,255,.2);
animation:bubbleFloat 8s ease-in-out infinite;
pointer-events:none;
}

@keyframes bubbleFloat{
0%,100%{transform:translateY(0) scale(.85);opacity:.45;}
50%{transform:translateY(-60px) scale(1.15);opacity:.85;}
}

#overlay{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.85);
z-index:999;
}

#overlay div{
background:white;
color:black;
padding:22px;
border-radius:20px;
font-size:1.2rem;
font-weight:bold;
text-align:center;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,.4);
}

audio{display:none;}

.credits{
position:fixed;
bottom:0;
left:0;
right:0;
padding:12px 8px;
text-align:center;
background:rgba(15,23,42,.25);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border-top:1px solid rgba(255,255,255,.08);
z-index:1000;
width:100%;
line-height:1.4;
font-weight:bold;
box-shadow:0 -4px 30px rgba(0,0,0,.2);
}

body.tv-mode .credits{
position:fixed!important;
bottom:0!important;
left:0!important;
right:0!important;
background:rgba(15,23,42,.85)!important;
}

.amtun{
display:inline-block;
font-family:cursive;
font-size:1.5rem;
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;
background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
background-size:400% 100%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbowSparkle 5s linear infinite;
}

@keyframes rainbowSparkle{
0%{background-position:0% 50%;filter:drop-shadow(0 0 4px rgba(255,255,255,.3));}
100%{background-position:400% 50%;filter:drop-shadow(0 0 10px rgba(255,255,255,.6));}
}

body>*{position:relative;z-index:1;}

@media(max-width:768px){
.stage{min-height:58vh;padding:14px;border-radius:24px;}
.stage-content{padding:16px;border-radius:20px;}
.stage-badges{flex-direction:column;align-items:center;}
.rakah-badge{width:100%;max-width:260px;}
}

/* ================= PLUGIN EFFECT: AQUARIUM ================= */
.aquarium-layer{
position:absolute;
inset:0;
pointer-events:none;
z-index:1;
overflow:hidden;
}

.aquarium-water-rays{
position:absolute;
inset:0;
pointer-events:none;
background:linear-gradient(
  110deg,
  transparent 0%,
  rgba(255,255,255,0.10) 35%,
  transparent 60%
);
animation:waterRayMove 9s ease-in-out infinite;
mix-blend-mode:screen;
}

@keyframes waterRayMove{
0%,100%{transform:translateX(-8%);opacity:.35;}
50%{transform:translateX(8%);opacity:.55;}
}

.fish-zone{
position:absolute;
pointer-events:none;
}

.fish-zone::before{
content:"";
position:absolute;
left:var(--mouthLeft);
top:var(--mouthTop);
width:4%;
height:5%;
border-radius:50%;
background:rgba(60,25,15,.25);
animation:mouthSing 3.8s ease-in-out infinite;
animation-delay:var(--d);
}

.fish-zone::after{
content:"";
position:absolute;
left:var(--tailLeft);
top:var(--tailTop);
width:18%;
height:35%;
border-radius:50%;
background:rgba(255,255,255,.16);
filter:blur(6px);
animation:tailWag 3.2s ease-in-out infinite;
animation-delay:var(--d);
}

@keyframes mouthSing{
0%,70%,100%{transform:scaleY(.35);opacity:.15;}
82%{transform:scaleY(1.25);opacity:.38;}
}

@keyframes tailWag{
0%,100%{transform:rotate(-4deg) scale(.9);opacity:.08;}
50%{transform:rotate(5deg) scale(1.08);opacity:.22;}
}


/* ================= V3.4 FIX: FULLSCREEN PLUGIN STAGES ================= */
body.plugin-stage-mode .grid{
  display:block;
  width:100%;
  max-width:none;
  margin:0 auto;
  flex:1;
}

body.plugin-stage-mode .stage,
body.plugin-stage-mode .spotlight-wrap{
  width:100%;
  min-height:calc(100vh - 245px);
  height:calc(100vh - 245px);
  border-radius:28px;
}

body.tv-mode.plugin-stage-mode .stage,
body.tv-mode.plugin-stage-mode .spotlight-wrap{
  min-height:calc(100vh - 220px);
  height:calc(100vh - 220px);
}

/* Salah Names: keep teaching panel narrow so mosque/time effects remain visible */
.story-stage{
  align-items:center!important;
  justify-content:flex-end!important;
}

.story-stage .stage-content{
  position:absolute;
  right:18px;
  top:18px;
  bottom:18px;
  width:min(30vw,310px);
  min-width:210px;
  padding:16px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:rgba(15,23,42,.32);

}

.story-stage .stage-title{
  font-size:clamp(1.6rem,3.2vw,3.4rem);
}

.story-stage .stage-sub{
  font-size:clamp(1rem,1.8vw,1.5rem);
}

.story-stage .stage-badges{
  flex-direction:column;
  align-items:stretch;
  gap:8px;
}

.story-stage .rakah-badge{
  font-size:clamp(.9rem,1.4vw,1.15rem);
  padding:9px 12px;
}

.story-night{
  background:linear-gradient(rgba(3,7,18,.78),rgba(2,6,23,.88))!important;
}

.story-sunset{
  background:linear-gradient(rgba(249,115,22,.45),rgba(88,28,12,.42))!important;
}

.story-bright-day{
  background:linear-gradient(rgba(250,204,21,.22),rgba(14,165,233,.10))!important;
}

.story-dawn{
  background:linear-gradient(rgba(255,182,193,.30),rgba(59,130,246,.16))!important;
}

/* Numbers spotlight overlay: no text tile, only active number glow at coordinates */
.number-focus-dot{
  position:absolute;
  width:clamp(54px,8vw,105px);
  height:clamp(54px,8vw,105px);
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(1);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,213,74,.55),rgba(255,213,74,.18) 45%,rgba(255,213,74,0) 72%);
  box-shadow:0 0 28px rgba(255,213,74,.75),0 0 55px rgba(255,255,255,.35);
  pointer-events:none;
  z-index:4;
  animation:numberPulse 1.15s ease-in-out infinite;
}

.number-focus-dot::before,
.number-focus-dot::after{
  content:"✦";
  position:absolute;
  color:#fff7ad;
  font-size:clamp(16px,2vw,30px);
  text-shadow:0 0 12px white;
  animation:numberSparkle 1.4s ease-in-out infinite;
}

.number-focus-dot::before{left:-10%;top:8%;}
.number-focus-dot::after{right:-8%;bottom:6%;animation-delay:.45s;}

@keyframes numberPulse{
  0%,100%{transform:translate(-50%,-50%) scale(.88);opacity:.65;}
  50%{transform:translate(-50%,-50%) scale(1.22);opacity:1;}
}

@keyframes numberSparkle{
  0%,100%{transform:scale(.65) rotate(0deg);opacity:.35;}
  50%{transform:scale(1.2) rotate(15deg);opacity:1;}
}

/* External bridge */
.external-bridge{
  width:100%;
  height:calc(100vh - 245px);
  min-height:520px;
  border-radius:28px;
  overflow:hidden;
  background:rgba(15,23,42,.65);
  box-shadow:0 0 35px rgba(255,255,255,.18);
}

.external-bridge iframe{
  width:100%;
  height:100%;
  border:0;
  background:white;
}

@media(max-width:768px){
  body.plugin-stage-mode .stage,
  body.plugin-stage-mode .spotlight-wrap,
  .external-bridge{
    min-height:calc(100vh - 230px);
    height:calc(100vh - 230px);
    border-radius:22px;
  }

  .story-stage .stage-content{
    left:12px;
    right:12px;
    top:auto;
    bottom:12px;
    width:auto;
    min-width:0;
    max-height:38%;
  }

  .story-stage .stage-badges{
    flex-direction:row;
    flex-wrap:wrap;
    justify-content:center;
  }
}

body.plugin-ui-final .story-stage .stage-badges{

function normalizeFileName(path){
return String(path).split("/").pop().replace(/\.(mp3|m4a|wav|ogg)$/i,"");
}

function surahNumberFromPath(path){
const raw = normalizeFileName(path);
const first = raw.split(/[_-]/)[0];
const m = first.match(/\d+/);
if(!m) return "";
return String(Number(m[0]));
}

function titleFromPath(path){
const meta = metaForPath(path);
if(meta) return meta.eng;
const raw = normalizeFileName(path);
return raw.replace(/[-_]/g," ").replace(/\b\w/g,m=>m.toUpperCase());
}

function metaForSurahNumber(no){
return SURAH_META[String(Number(no))] || null;
}

function metaForPath(path){
const file = normalizeFileName(path);
if(FILE_META && FILE_META[file]) return FILE_META[file];
return metaForSurahNumber(surahNumberFromPath(path));
}

function makeSurahDisplayFromPath(path, fallbackIndex){
const no = surahNumberFromPath(path);
const meta = metaForPath(path);
return {
  name: meta?.name || `سورة ${no || fallbackIndex + 1}`,
  eng: meta?.eng || `Surah ${no || titleFromPath(path)}`,
  emoji: meta?.emoji || "📖",
  color: meta?.color || DEFAULT_PALETTE[fallbackIndex % DEFAULT_PALETTE.length],
  surahNo: no
};
};
}

function getListenFiles(){
return quranSyncFiles().map(f=>f.path).filter(p=>/^listen\/.+\.(mp3|m4a|wav|ogg)$/i.test(p));
}

function getLearnFiles(){
const fromSync = quranSyncFiles().map(f=>f.path).filter(p=>/^learn\/.+\.(mp3|m4a|wav|ogg)$/i.test(p));
const fromSlices = Object.keys(slicesData || {}).filter(k=>/^learn\/.+\.(mp3|m4a|wav|ogg)$/i.test(k));
return [...new Set([...fromSync,...fromSlices])];
}

function findLearnForSurah(s){
const learns = getLearnFiles();
const candidates = [];
if(s.surahNo) candidates.push(String(s.surahNo));
candidates.push(String(s.id).replace(/[^\d]/g,""));
for(const c of candidates){
const hit = learns.find(p => surahNumberFromPath(p) === c);
if(hit) return hit;
}
return null;
}

function buildQuranListenSource(){
const base = surahs.map(s=>{
const learn = findLearnForSurah(s);
return {
...s,
listenFile:s.file,
learnFile:learn,
slices:learn ? slicesData[learn] : null,
hasLearn:!!learn
};
});

const usedNums = new Set(base.map(s=>s.surahNo).filter(Boolean));
const extraListen = getListenFiles()
.filter(p => !usedNums.has(surahNumberFromPath(p)))
.map((p,idx)=>{
const display = makeSurahDisplayFromPath(p, idx);
const learnMatch = getLearnFiles().find(l => surahNumberFromPath(l) === surahNumberFromPath(p));
return {
id:`listen-${display.surahNo || idx}`,
...display,
file:p,
listenFile:p,
learnFile:learnMatch,
slices:learnMatch ? slicesData[learnMatch] : null,
hasLearn:!!learnMatch
};
});

return [...base,...extraListen];
}

function buildQuranLearnSource(){
const learns = getLearnFiles();
return learns.map((p,idx)=>{
const display = makeSurahDisplayFromPath(p, idx);
return {
id:display.surahNo || `learn-${idx}`,
...display,
emoji:display.emoji || "🎓",
file:p,
learnFile:p,
slices:slicesData[p] || null,
learningMode:slicesData[p] ? "slices" : "durationChunks",
hasLearn:true
};
});
}

function renderQuranItems(){

if(!source.length) source = surahs;

source.forEach((s,idx)=>{
const item = {...s};
if(isMainListen && item.listenFile) item.file = item.listenFile;
if(!isMainListen && item.learnFile) item.file = item.learnFile;
createAudioCard(item,idx,"quran", isMainListen && item.hasLearn);
});

const requested = params().get("id") || params().get("surah");
if(requested && map[requested]){
TV.focused = map[requested].index;

}

if(engine === "spotlight") return buildSpotlight(plugin, autoplay);
if(engine === "story") return buildStory(plugin, autoplay || plugin.autoStart === true || plugin.id === "salah-names" || plugin.id === "salahnames");
return buildGallery(plugin, autoplay);
}

function subtitleForEngine(plugin){
if(plugin.engine === "directAudio") return " ";
if(plugin.engine === "spotlight") return " ";
if(plugin.engine === "story") return " ";
return " ";
}

function pluginMp3s(plugin){
const folder = plugin.folder || plugin.id;
const syncFiles = pluginSyncFiles(plugin);
let mp3s = [];
if(Array.isArray(plugin.audios) && plugin.audios.length) mp3s = plugin.audios;
else mp3s = syncFiles.map(f=>f.path).filter(p=>p && p.startsWith(folder + "/") && /\.(mp3|m4a|wav|ogg)$/i.test(p));

let coordinateSpotlightTimer = null;
let coordinateDemoIndex = 0;

function stopCoordinateSpotlight(){
if(coordinateSpotlightTimer){
clearInterval(coordinateSpotlightTimer);
coordinateSpotlightTimer = null;
}
}

function orderedCoordinateKeys(plugin){
const coords = plugin.coordinates || {};
return Object.keys(coords).sort((a,b)=>Number(a)-Number(b));
}

function positionCoordinateFocus(plugin, index){
const dot = document.getElementById("coordinateFocusDot");
if(!dot) return;

const keys = orderedCoordinateKeys(plugin);
if(!keys.length) return;

const key = keys[((index % keys.length) + keys.length) % keys.length];
const p = plugin.coordinates[key];
if(!p) return;

const stage = dot.closest(".spotlight-wrap,.stage");
const img = stage ? stage.querySelector(".stage-img") : null;

if(img && stage){
  if(!img.complete || !img.naturalWidth){
    img.onload = ()=>positionCoordinateFocus(plugin,index);
  }

  const stageRect = stage.getBoundingClientRect();

  // Actual displayed rectangle for object-fit: contain.
  // Coordinates map to visible image only, not to screen margins.
  const naturalW = img.naturalWidth || 16;
  const naturalH = img.naturalHeight || 9;
  const stageW = stageRect.width;
  const stageH = stageRect.height;

  const imageRatio = naturalW / naturalH;
  const stageRatio = stageW / stageH;

  let renderW, renderH, offsetX, offsetY;

  if(stageRatio > imageRatio){
    renderH = stageH;
    renderW = renderH * imageRatio;
    offsetX = (stageW - renderW) / 2;
    offsetY = 0;
  } else {
    renderW = stageW;
    renderH = renderW / imageRatio;
    offsetX = 0;
    offsetY = (stageH - renderH) / 2;
  }

  const x = offsetX + (Number(p.x) / 100) * renderW;
  const y = offsetY + (Number(p.y) / 100) * renderH;

  dot.style.left = x + "px";
  dot.style.top = y + "px";
} else {
  dot.style.left = p.x + "%";
  dot.style.top = p.y + "%";
}

dot.dataset.index = String(index);
dot.dataset.key = key;
} else {
  dot.style.left = p.x + "%";
  dot.style.top = p.y + "%";
}

dot.dataset.index = String(index);
dot.dataset.key = key;
}

function advanceCoordinateSpotlight(plugin){
coordinateDemoIndex++;
positionCoordinateFocus(plugin, coordinateDemoIndex);
}

function startCoordinateDemo(plugin){
stopCoordinateSpotlight();
coordinateDemoIndex = 0;
positionCoordinateFocus(plugin,0);
coordinateSpotlightTimer = setInterval(()=>advanceCoordinateSpotlight(plugin),1400);
}

function startCoordinateSpotlight(plugin,audio){
stopCoordinateSpotlight();
const keys = orderedCoordinateKeys(plugin);
if(!keys.length) return;
positionCoordinateFocus(plugin,0);

coordinateSpotlightTimer = setInterval(()=>{
if(!audio || audio.paused || audio.ended){
stopCoordinateSpotlight();
return;
}
const duration = audio.duration && isFinite(audio.duration) ? audio.duration : 0;
let i = 0;
if(duration){
  i = Math.min(keys.length-1, Math.floor((audio.currentTime / duration) * keys.length));
} else {
  i = (Number(document.getElementById("coordinateFocusDot")?.dataset.index || 0) + 1) % keys.length;
}
positionCoordinateFocus(plugin,i);
},250);
}

function runStorySequence(seq,audio){
clearTimeout(storyTimer);
if(!seq || !seq.length) return;

let lastIndex = -1;

const updateByAudio = ()=>{
  if(!audio || !audio.duration || !isFinite(audio.duration)){
    return false;
  }

  const i = Math.min(seq.length - 1, Math.floor((audio.currentTime / audio.duration) * seq.length));

  if(i !== lastIndex){
    lastIndex = i;
    renderStoryStep(seq[i]);
  }

  if(audio.paused || audio.ended){
    return false;
  }

  storyTimer = setTimeout(updateByAudio,180);
  return true;
};

// Audio-synced mode: wait for real playback so overlay/audio never mismatch.
if(audio){
  if(!audio.paused && !audio.ended && updateByAudio()) return;
  renderStoryStep(seq[0]);
  return;
}

// Demo fallback only when no audio exists.
let i=0;
const step=()=>{
  renderStoryStep(seq[i % seq.length]);
  i++;
  storyTimer = setTimeout(step,4200);
};
step();
}

function renderStoryStep(step){
const overlay = document.getElementById("storyOverlay");
const arabic = document.getElementById("storyArabic");
const name = document.getElementById("storyName");
const badges = document.getElementById("storyBadges");
if(!overlay || !arabic || !name || !badges) return;
overlay.className = "story-overlay story-" + (step.effect || "dawn");
arabic.innerText = step.arabic || "";
name.innerText = step.name || "";
badges.innerHTML = (step.rakah || []).map(r=>`<div class="rakah-badge">${r}</div>`).join("");
}

/* ================= AUDIO + LEARN/HIFZ ================= */
function play(id){
const item = map[id];
if(!item || item.type !== "audio") return;

sequenceCancelToken++;
const token = sequenceCancelToken;

if(currentAudio && currentAudio !== item.audio){
currentAudio.pause();
currentAudio.currentTime = 0;
if(currentCard) currentCard.classList.remove("active-tile");
}

currentAudio = item.audio;
currentButton = item.btn;
currentCard = item.card;
currentItem = item;

item.card.classList.add("active-tile");

const mode = getMode();
const hasSlices = Array.isArray(item.s.slices) && item.s.slices.length;

if((mode === "repeat5" || mode === "hifz") && (hasSlices || item.s.learningMode === "durationChunks" || item.s.learningMode === "silence")){
runLearningSequence(item, mode, token);
} else {
item.audio.loop = loopAll;
item.audio.play().catch(()=>{});
}

speak(item.s.name || item.s.eng || "");
}

function toSeconds(t){
if(typeof t === "number") return t;
const parts = String(t).split(":").map(Number);
if(parts.length === 2) return parts[0]*60 + parts[1];
if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
return Number(t) || 0;
}

function getChunkEnds(item){
if(Array.isArray(item.s.slices) && item.s.slices.length) return item.s.slices.map(toSeconds);

const audio = item.audio;
const duration = audio.duration || 0;
if(!duration || !isFinite(duration)) return [];

const plugin = item.s.plugin || currentPlugin || {};
const chunkMode = plugin.chunkMode || item.s.chunkMode || {};
let chunks = chunkMode.chunkCount || 0;

if(!chunks && plugin.id === "names"){
const label = item.s.eng || "";
const nums = label.match(/\d+/g) || [];
if(nums.length >= 2){
const count = Math.abs(Number(nums[1]) - Number(nums[0])) + 1;
chunks = Math.max(1, Math.ceil(count / (chunkMode.namesPerChunk || 4)));
}
}

if(!chunks && Array.isArray(plugin.spotlight?.items)) chunks = plugin.spotlight.items.length;
if(!chunks && Array.isArray(plugin.sequence)) chunks = plugin.sequence.length;
if(!chunks) chunks = 5;

const step = duration / chunks;
return Array.from({length:chunks},(_,i)=>Math.min(duration, step*(i+1)));
}

function playSegment(audio,start,end,token){
return new Promise(resolve=>{
if(token !== sequenceCancelToken) return resolve();
audio.pause();
audio.currentTime = Math.max(0,start);
audio.play().catch(()=>resolve());
const tick = ()=>{
if(token !== sequenceCancelToken){
audio.removeEventListener("timeupdate",tick);
return resolve();
}
if(audio.currentTime >= end){
audio.pause();
audio.removeEventListener("timeupdate",tick);
resolve();
}
};
audio.addEventListener("timeupdate",tick);
});
}

async function runLearningSequence(item, mode, token){
const audio = item.audio;

if(!audio.duration || !isFinite(audio.duration)){
await new Promise(resolve=>{
audio.addEventListener("loadedmetadata",resolve,{once:true});
audio.load();
});
}

const ends = getChunkEnds(item);
if(!ends.length){
audio.play().catch(()=>{});
return;
}

const starts = [0].concat(ends.slice(0,-1));
const repeat = ((item.s.plugin || currentPlugin || {}).chunkMode || {}).repeatCount || 5;

if(mode === "repeat5"){
for(let i=0;i<ends.length;i++){
for(let r=0;r<repeat;r++){
if(token !== sequenceCancelToken) return;
await playSegment(audio,starts[i],ends[i],token);
await sleep(250);
}
}
}

if(mode === "hifz"){
for(let upto=0;upto<ends.length;upto++){
for(let r=0;r<repeat;r++){
if(token !== sequenceCancelToken) return;
await playSegment(audio,starts[upto],ends[upto],token);
await sleep(250);
}
if(token !== sequenceCancelToken) return;
await playSegment(audio,0,ends[upto],token);
await sleep(450);
}
}

if(loopAll && token === sequenceCancelToken){
runLearningSequence(item,mode,token);
}
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function pauseCurrent(){
sequenceCancelToken++;
if(currentAudio){ currentAudio.pause(); }
}

function stopAll(clearFocus=true){
sequenceCancelToken++;
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime = 0;
}
if(currentCard) currentCard.classList.remove("active-tile");
currentAudio = null;
currentButton = null;
currentCard = null;
currentItem = null;
if(clearFocus) updateFocus();
}

function toggleLoopAll(){
loopAll = !loopAll;
document.getElementById("loopBtn").innerText = loopAll ? "🔁 Loop ON" : "🔁 Loop OFF";
if(currentAudio) currentAudio.loop = loopAll;
}

document.getElementById("mode").addEventListener("change",()=>{
if(currentView === "quran") renderQuranItems();
});

/* ================= NAVIGATION ================= */
function move(dir){
const max = items.length - 1;
if(max < 0) return;

if(dir === "right") TV.focused = Math.min(max,TV.focused + 1);
if(dir === "left") TV.focused = Math.max(0,TV.focused - 1);
if(dir === "down") TV.focused = Math.min(max,TV.focused + TV.cols);
if(dir === "up") TV.focused = Math.max(0,TV.focused - TV.cols);

updateFocus();
}

function updateFocus(){
const cards = document.querySelectorAll(".card,.stage,.spotlight-wrap");
cards.forEach(c=>c.classList.remove("remote-focus"));

const el = cards[TV.focused];
if(!el) return;

el.classList.add("remote-focus");

if(TV.isTV){
el.scrollIntoView({block:"center",behavior:"smooth"});
}
}

function handleOverlayDismissal(){
const overlay = document.getElementById("overlay");
if(overlay && overlay.style.display !== "none"){
const id = params().get("id") || params().get("surah");
if(id && map[id]) play(id);
overlay.style.display = "none";
return true;
}
return false;
}

document.addEventListener("keydown",(e)=>{
const k = e.keyCode;
const activeEl = document.activeElement;

if(document.getElementById("overlay").style.display === "flex"){
const okKeys = ["Enter","NumpadEnter"," ","OK","Select"];
if(k===23 || k===66 || okKeys.includes(e.key) || k===19 || k===20 || k===21 || k===22 || (e.key||"").startsWith("Arrow")){
e.preventDefault();
handleOverlayDismissal();
return;
}
}

if(activeEl && (activeEl.id==="btnBack" || activeEl.id==="btnStop" || activeEl.id==="loopBtn" || activeEl.id==="mode")){
if(k===22 || e.key==="ArrowRight"){
e.preventDefault();
if(activeEl.id==="btnBack") document.getElementById("btnStop").focus();
else if(activeEl.id==="btnStop") document.getElementById("loopBtn").focus();
else if(activeEl.id==="loopBtn") document.getElementById("mode").focus();
}
if(k===21 || e.key==="ArrowLeft"){
e.preventDefault();
if(activeEl.id==="btnStop" && document.getElementById("btnBack").style.display !== "none") document.getElementById("btnBack").focus();
else if(activeEl.id==="loopBtn") document.getElementById("btnStop").focus();
else if(activeEl.id==="mode") document.getElementById("loopBtn").focus();
}
if(k===20 || e.key==="ArrowDown"){
e.preventDefault();
activeEl.blur();
updateFocus();
}
return;
}

if(k===21 || e.key==="ArrowLeft"){
e.preventDefault();
if(TV.focused % TV.cols === 0) return;
move("left");
}

if(k===22 || e.key==="ArrowRight"){
e.preventDefault();
if((TV.focused + 1) % TV.cols === 0) return;
move("right");
}

if(k===20 || e.key==="ArrowDown"){
e.preventDefault();
move("down");
}

if(k===19 || e.key==="ArrowUp"){
e.preventDefault();
if(TV.focused < TV.cols && currentView !== "landing"){
const cards = document.querySelectorAll(".card,.stage,.spotlight-wrap");
cards.forEach(c=>c.classList.remove("remote-focus"));
const first = document.getElementById("btnBack").style.display !== "none" ? "btnBack" : "btnStop";
document.getElementById(first).focus();
} else {
move("up");
}
}

const okKeys = ["Enter","NumpadEnter"," ","OK","Select"];
if(k===23 || k===66 || okKeys.includes(e.key)){
if(activeEl && !activeEl.closest(".topbar")){
e.preventDefault();
const item = items[TV.focused];
if(!item) return;
if(item.type === "landing") openMenuEntry(item.entry);
else if(item.type === "audio") play(item.id);
else if(item.type === "spotlight" && currentPlugin) { advanceCoordinateSpotlight(currentPlugin); }
else if(item.type === "story") runStorySequence(defaultSalahNamesSequence());
}
}
});

/* ================= BACKGROUND PARTICLES ================= */
const starsContainer = document.querySelector(".stars");
for(let i=0;i<80;i++){
const d = document.createElement("div");
d.className = "star";
d.style.left = Math.random()*100 + "%";
d.style.top = Math.random()*100 + "%";
starsContainer.appendChild(d);
}
for(let i=0;i<40;i++){
const s = document.createElement("div");
s.className = "sparkle";
s.style.left = Math.random()*100 + "%";
s.style.top = Math.random()*100 + "%";
starsContainer.appendChild(s);
}

/* ================= QR LINK HANDLING ================= */
function qrFix(){
const id = params().get("id") || params().get("surah");

if(!id || !map[id]){
updateFocus();
return;
}

const item = map[id];
TV.focused = item.index;

setTimeout(()=>{
item.card.classList.add("active-tile");
item.card.scrollIntoView({behavior:"smooth",block:"center"});

currentCard = item.card;
currentAudio = item.audio;
currentButton = item.btn;
currentItem = item;

document.getElementById("overlay").style.display = "flex";
setTimeout(()=>speak(item.s.name),600);
updateFocus();
},500);
}

document.getElementById("overlay").onclick = ()=>handleOverlayDismissal();

window.addEventListener("popstate",()=>route());

async function route(){
menuData = await fetchFirstJson(["menu.json","../menu.json"], FALLBACK_MENU);
slicesData = await fetchFirstJson(["slices.json","../slices.json","learn.master.slices.json","../learn.master.slices.json"], {});
if(slicesData && slicesData.QURAN){
  const flat = {};
  Object.values(slicesData.QURAN).forEach(entry=>{
    if(entry && entry.file && Array.isArray(entry.slices)) flat[entry.file] = entry.slices;
  });
  slicesData = flat;
}

const p = params();
const id = p.get("id") || p.get("surah");
const pluginId = p.get("plugin");

if(id){
buildQuran();
return;
}

if(pluginId && pluginId !== "landing"){
const foundEntry = menuData.find(m => (m.plugin||{}).id === pluginId);
const found = foundEntry ? foundEntry.plugin : null;
if(pluginId === "quran") buildQuran();
else if(pluginId === "salah" && foundEntry) buildExternalBridge(foundEntry);
else if(found) buildPlugin(found, p.get("autoplay") === "1");
else buildLanding();
return;
}

buildLanding();
}

window.addEventListener("load",route);

window.addEventListener("resize",()=>{
const dot = document.getElementById("coordinateFocusDot");
if(dot && currentPlugin && currentPlugin.coordinates){
  const idx = Number(dot.dataset.index || 0);
  setTimeout(()=>positionCoordinateFocus(currentPlugin, idx),80);
}
});


window.addEventListener("resize",()=>{
const dot = document.getElementById("coordinateFocusDot");
if(dot && currentPlugin && currentPlugin.coordinates){
  const idx = Number(dot.dataset.index || 0);
  setTimeout(()=>positionCoordinateFocus(currentPlugin, idx),90);
}
});

</script>
