<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My Little Quran Corner!</title>

<meta name="theme-color" content="#0f172a"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-touch-callout: none;
-webkit-user-select: none;
user-select: none;
}

body{
background:radial-gradient(circle at top,#172554,#020617 70%);
min-height:100vh;
color:white;
display:flex;
flex-direction:column;
cursor:none;
overflow-x: hidden;
}

/* TV specific clamping rules - only applied if device is TV/Laptop */
body.tv-mode {
height: 100vh;
overflow: hidden;
}

/* ================= ORIGINAL BACKGROUND STARS ANIMATION ================= */
.stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate, drift 25s linear infinite;
}

@keyframes twinkle{
0%{opacity:.2;transform:scale(.5);}
100%{opacity:1;transform:scale(1.5);}
}

@keyframes drift{
from{transform:translateY(0);}
to{transform:translateY(-120px);}
}

/* ================= TITLE ================= */
h1{
text-align:center;
font-size:clamp(1.5rem,3vh,3rem);
background:linear-gradient(90deg,#facc15,#38bdf8,#f472b6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #38bdf8);}
to{filter:drop-shadow(0 0 18px #f472b6);}
}

.subtitle{
text-align:center;
color:#cbd5e1;
font-size:clamp(.8rem,1.4vh,1.2rem);
margin-bottom:1vh;
}

/* ================= TOPBAR ================= */
.topbar{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:10px;
z-index: 10;
}

.topbar button,
.topbar select{
border:none;
padding:10px 14px;
border-radius:16px;
font-weight:bold;
background:linear-gradient(90deg,#facc15,#fde68a);
cursor: pointer;
}

/* ================= GRID ENGINE ================= */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:1.5vh;
width:100%;
padding: 25px 15px 15px 15px; /* Prevents top white outline clipping on TV */
}

body.tv-mode .grid {
flex:1;
grid-template-rows:repeat(4,1fr);
gap:1vh;
padding: 25px 15px;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr) !important;
    grid-template-rows: auto !important;
  }
}

/* ================= CARD (RESTORED EXACT TEXT/EMOJI FILL UTILIZATION) ================= */
.card{
position:relative;
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
justify-content:space-between;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(255,255,255,.1);
transition:.2s;
aspect-ratio:1/1;
cursor: pointer;
height: 100%;
width: 100%;
}

.card:active{
transform:scale(.98);
}

.emoji{font-size:clamp(1.2rem,2.2vh,2.4rem);}
.arabic{font-size:clamp(1rem,2.2vh,1.8rem);font-weight:bold;}
.english{font-size:clamp(.7rem,1.4vh,1rem);opacity:.9;}

/* ================= RESTORED CARD PLAYING STATE (YELLOW GRADIENT PAUSE FALLBACK) ================= */
.card.active-tile {
  background: linear-gradient(135deg, #facc15, #fde68a) !important;
  animation:playPulse 1.5s infinite;
  box-shadow:0 0 25px white;
}

/* Inverse card content color to dark only when playing so text remains perfectly readable */
.card.active-tile .emoji,
.card.active-tile .arabic,
.card.active-tile .english {
  color: #020617 !important;
  opacity: 1;
}

/* ================= FOCUS AND ACTIONS ================= */
.remote-focus{
outline:5px solid white;
outline-offset:4px;
z-index:10;
transform:scale(1.05);
}

@keyframes playPulse{
0%,100%{transform:scale(1.03);}
50%{transform:scale(1.08);}
}

/* ================= CREDITS (3 LINES - ALWAYS VISIBLE) ================= */
.credits{
position:relative;
text-align:center;
padding:12px 6px;
font-size:0.95rem;
background:rgba(0,0,0,.4);
z-index: 10;
margin-top: auto;
line-height: 1.5;
font-weight: bold;
}

.amtun{
display: inline-block;
font-family: cursive;
font-weight: 900;
font-size: 1.6rem;
letter-spacing: 1px;
background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet, red);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: rainbow 4s linear infinite;
background-size: 400% auto;
filter: drop-shadow(0 0 2px rgba(255,255,255,0.2));
}

@keyframes rainbow{
0%{background-position:0% 50%;}
100%{background-position:400% 50%;}
}
</style>
</head>

<body>

<div class="stars" id="starField"></div>

<h1>🌙 Mariam & Hamza's 🌙</h1>
<div class="subtitle">✨ Quran Adventures ✨</div>

<div class="topbar">
<button onclick="stopAll()">Stop</button>
<button onclick="toggleLoop()">Loop</button>
<select id="mode">
<option value="listen">Listen</option>
<option value="learn">Learn</option>
</select>
</div>

<div class="grid" id="grid"></div>

<div class="credits">
Created By:<br/>
<span class="amtun">AMTUN NOOR</span><br/>
May 2026
</div>

<script>
/* ================= DATA ENGINE ================= */

const surahs=[
{id:"A1",name:"الفاتحة",eng:"Al Fatiha",emoji:"🌟",file:"A5.mp3",color:"linear-gradient(135deg,#f59e0b,#ef4444)"},
{id:"A2",name:"الإخلاص",eng:"Al Ikhlas",emoji:"💖",file:"A6.mp3",color:"linear-gradient(135deg,#ec4899,#8b5cf6)"},
{id:"A3",name:"الفلق",eng:"Al Falaq",emoji:"🌙",file:"A7.mp3",color:"linear-gradient(135deg,#06b6d4,#3b82f6)"},
{id:"A4",name:"الناس",eng:"An Naas",emoji:"⭐",file:"A8.mp3",color:"linear-gradient(135deg,#10b981,#14b8a6)"},
{id:"A5",name:"الفيل",eng:"Al Feel",emoji:"🐘",file:"A9.mp3",color:"linear-gradient(135deg,#8b5cf6,#6366f1)"},
{id:"A6",name:"قريش",eng:"Quraish",emoji:"🕋",file:"A10.mp3",color:"linear-gradient(135deg,#0ea5e9,#2563eb)"},
{id:"A7",name:"الماعون",eng:"Al Ma'un",emoji:"🤲",file:"A11.mp3",color:"linear-gradient(135deg,#14b8a6,#22c55e)"},
{id:"A8",name:"الكوثر",eng:"Al Kawther",emoji:"💧",file:"A12.mp3",color:"linear-gradient(135deg,#f97316,#fb7185)"},
{id:"A9",name:"الكافرون",eng:"Al Kafiroon",emoji:"☀️",file:"A13.mp3",color:"linear-gradient(135deg,#84cc16,#22c55e)"},
{id:"A10",name:"النصر",eng:"An Nasr",emoji:"🏆",file:"A14.mp3",color:"linear-gradient(135deg,#38bdf8,#818cf8)"},
{id:"A11",name:"المسد",eng:"Al Masad",emoji:"🔥",file:"A15.mp3",color:"linear-gradient(135deg,#ef4444,#f97316)"},
{id:"A12",name:"تكبير",eng:"Takbir",emoji:"🕌",file:"A16.mp3",color:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
{id:"A13",name:"الأذان",eng:"Azan",emoji:"📢",file:"A17.mp3",color:"linear-gradient(135deg,#06b6d4,#0ea5e9)"},
{id:"A14",name:"الكلمة الثانية",eng:"Second Kalima",emoji:"🌹",file:"A18.mp3",color:"linear-gradient(135deg,#14b8a6,#0f766e)"},
{id:"A15",name:"الضحى",eng:"Ad Duha",emoji:"☀️",file:"A19.mp3",color:"linear-gradient(135deg,#facc15,#fb7185)"},
{id:"A16",name:"إِنَّ الْمُسْلِمِينَ",eng:"Innal Muslimeena",emoji:"💚",file:"A20.mp3",color:"linear-gradient(135deg,#22c55e,#16a34a)"}
];

/* ================= ADAPTIVE ENGINE MODE DETECTOR ================= */
const TV = {
  cols: window.innerWidth <= 768 ? 2 : 4,
  focused: 0,
  isTV: /Android TV|TV|SmartTV|MiTV/i.test(navigator.userAgent) || !("ontouchstart" in window)
};

if (TV.isTV && window.innerWidth > 768) {
  document.body.classList.add("tv-mode");
}

window.addEventListener("resize", () => {
  TV.cols = window.innerWidth <= 768 ? 2 : 4;
  if (TV.isTV && window.innerWidth > 768) {
    document.body.classList.add("tv-mode");
  } else {
    document.body.classList.remove("tv-mode");
  }
});

let currentAudio = null;
let loop = false;

/* ================= RENDER STAR GENERATOR FOR ORIGINAL BACKGROUND ================= */
const starField = document.getElementById("starField");
for(let i=0; i<35; i++){
  const star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";
  star.style.animationDelay = Math.random() * 3 + "s";
  starField.appendChild(star);
}

/* ================= RENDER CARDS ================= */
const grid = document.getElementById("grid");

surahs.forEach((s, i) => {
  const c = document.createElement("div");
  c.className = "card";
  c.style.background = s.color;

  c.innerHTML = `
    <div class="emoji">${s.emoji}</div>
    <div class="arabic">${s.name}</div>
    <div class="english">${s.eng}</div>
    <audio src="${s.file}" preload="none"></audio>
  `;

  c.onclick = () => {
    TV.focused = i;
    updateFocus();
    play(i);
  };
  grid.appendChild(c);
});

/* ================= PRELOAD SYSTEM BUFFER ================= */
function preloadBuffer(currentIndex) {
  const lookAhead = 2; 
  for (let i = 1; i <= lookAhead; i++) {
    let nextIndex = (currentIndex + i) % surahs.length;
    const cards = document.querySelectorAll(".card");
    if(cards[nextIndex]) {
      const audio = cards[nextIndex].querySelector("audio");
      if (audio && audio.preload !== "auto") audio.preload = "auto";
    }
  }
}

/* ================= AUDIO CONTROLS ================= */
function play(i) {
  const cards = [...document.querySelectorAll(".card")];
  cards.forEach(c => c.classList.remove("active-tile"));
  
  const item = cards[i].querySelector("audio");

  if (currentAudio) {
    currentAudio.pause();
  }

  currentAudio = item;
  if(currentAudio) {
    currentAudio.loop = loop;
    currentAudio.play().then(() => {
      cards[i].classList.add("active-tile");
    }).catch(e => console.log("Media channel verified:", e));
  }

  const mode = document.getElementById("mode").value;
  if (mode === "learn") {
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(surahs[i].name));
  }
}

/* ================= D-PAD MOTIONS ================= */
function move(dir){
  const max = surahs.length - 1;

  if(dir === "right") TV.focused = Math.min(max, TV.focused + 1);
  if(dir === "left")  TV.focused = Math.max(0, TV.focused - 1);
  if(dir === "down")  TV.focused = Math.min(max, TV.focused + TV.cols);
  if(dir === "up")    TV.focused = Math.max(0, TV.focused - TV.cols);

  updateFocus();
}

function updateFocus(){
  const cards = document.querySelectorAll(".card");
  cards.forEach(c => c.classList.remove("remote-focus"));

  const el = cards[TV.focused];
  if(!el) return;

  el.classList.add("remote-focus");
  preloadBuffer(TV.focused);

  if (TV.isTV) {
    el.scrollIntoView({
      block: "center",
      behavior: "smooth"
    });
  }
}

function stopAll(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active-tile"));
}

function toggleLoop(){
  loop = !loop;
  if(currentAudio) currentAudio.loop = loop;
}

/* ================= REMOTE RECEIVER DELEGATES ================= */
document.addEventListener("keydown",(e)=>{
  const k = e.keyCode;

  if(k === 21 || e.key === "ArrowLeft") move("left");
  if(k === 22 || e.key === "ArrowRight") move("right");
  if(k === 19 || e.key === "ArrowUp") move("up");
  if(k === 20 || e.key === "ArrowDown") move("down");

  if(k === 23 || k === 66 || e.key === "Enter"){
    play(TV.focused);
  }
});

window.onload = () => {
  const id = new URLSearchParams(location.search).get("id");
  if(id){
    const index = surahs.findIndex(s => s.id === id);
    if(index >= 0) {
      TV.focused = index;
      play(index);
    }
  }
  updateFocus();
};
</script>

</body>
</html>
