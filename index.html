<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>My Little Quran Corner!</title>
<meta name="theme-color" content="#0f172a"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-touch-callout:none;
-webkit-user-select:none;
user-select:none;
}

body{
background:radial-gradient(circle at top,#172554,#020617 70%);
min-height:100vh;
overflow-x:hidden;
color:white;
padding:20px;
padding-bottom:110px;
display:flex;
flex-direction:column;
}

body.tv-mode{
height:100vh;
overflow:hidden;
padding:15px;
padding-top:45px!important;
padding-bottom:95px;
}

body.tv-mode h1{
margin-top:0!important;
font-size:2.8rem!important;
}

body.tv-mode .subtitle{
margin-bottom:20px!important;
}

/* ================= STARS & BACKGROUND ANIMATIONS ================= */
.stars{
position:fixed;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:0;
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate, drift 25s linear infinite;
}

@keyframes twinkle{
from{opacity:.2;transform:scale(.5);}
to{opacity:1;transform:scale(1.5);}
}

@keyframes drift{
from{transform:translateY(0px);}
to{transform:translateY(-120px);}
}

.sparkle{
position:absolute;
width:2px;
height:2px;
border-radius:50%;
background:white;
opacity:.8;
animation:sparkleFloat 12s linear infinite;
}

@keyframes sparkleFloat{
0%{transform:translateY(40px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-140px);opacity:0;}
}

/* ================= TITLE HEADER ================= */
h1{
text-align:center;
font-size:2.5rem;
margin-bottom:8px;
background:linear-gradient(90deg,#facc15,#38bdf8,#f472b6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate, headerFloat 4s ease-in-out infinite;
display:block;
width:100%;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #38bdf8);}
to{filter:drop-shadow(0 0 18px #f472b6);}
}

@keyframes headerFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.subtitle{
text-align:center;
margin-bottom:24px;
color:#cbd5e1;
animation:headerFloat 4s ease-in-out infinite;
animation-delay:.5s;
}

/* ================= CONTROL TOPBAR ================= */
.topbar{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:25px;
flex-wrap:wrap;
z-index:10;
}

.topbar button,
.topbar select{
border:none;
padding:12px 16px;
border-radius:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#facc15,#fde68a);
}

.topbar button:focus,
.topbar select:focus{
outline:5px solid #fff!important;
outline-offset:2px;
transform:scale(1.05);
}

#btnBack{display:none;}

/* ================= GRID ENGINE ================= */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
max-width:none;
width:100%;
margin:auto;
flex:1;
}

@media(max-width:768px){
.grid{grid-template-columns:repeat(2,1fr)!important;}
}

body.tv-mode .grid{
grid-template-rows:repeat(4,1fr);
gap:12px;
padding-top:5px;
margin-bottom:15px;
}

/* Landing Living Tiles: carousel feel without hiding cards */
body.landing-mode .grid{
perspective:1200px;
align-items:stretch;
}

body.landing-mode .card{
animation:livingFloat 5s ease-in-out infinite;
transform-style:preserve-3d;
}

body.landing-mode .card:nth-child(2n){animation-delay:.35s;}
body.landing-mode .card:nth-child(3n){animation-delay:.7s;}

@keyframes livingFloat{
0%,100%{transform:translateY(0) rotateX(0deg);}
50%{transform:translateY(-7px) rotateX(2deg);}
}

body.landing-mode .remote-focus{
transform:translateY(-10px) scale(1.08) rotateX(4deg)!important;
box-shadow:0 0 38px rgba(255,255,255,.95), 0 18px 35px rgba(0,0,0,.35);
}

body.landing-mode .remote-focus:after{
content:"";
position:absolute;
inset:-3px;
border-radius:30px;
background:linear-gradient(120deg,rgba(255,255,255,.45),transparent,rgba(250,204,21,.45));
z-index:0;
animation:focusShimmer 1.8s linear infinite;
pointer-events:none;
}

@keyframes focusShimmer{
0%{opacity:.25;transform:translateX(-8px);}
50%{opacity:.8;}
100%{opacity:.25;transform:translateX(8px);}
}

/* ================= CARD DESIGN ================= */
.card{
position:relative;
overflow:hidden;
border-radius:28px;
padding:18px;
min-height:210px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
transition:.3s;
backdrop-filter:blur(10px);
box-shadow:0 0 20px rgba(255,255,255,.1);
animation:float 4s ease-in-out infinite;
height:100%;
width:100%;
background-size:cover!important;
background-position:center!important;
}

.card:before{
content:"";
position:absolute;
inset:0;
background:rgba(2,6,23,.18);
z-index:0;
pointer-events:none;
}

.card>*{position:relative;z-index:1;}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 0 30px rgba(255,255,255,.35);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.card-info-box{
display:flex;
flex-direction:column;
justify-content:space-between;
height:100%;
width:100%;
}

.emoji{font-size:2.2rem;margin-bottom:8px;}
.arabic{font-size:1.8rem;font-weight:bold;margin-bottom:4px;}
.english{font-size:1.05rem;opacity:.95;}

.badge{
position:absolute;
top:12px;
right:12px;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,.9);
color:#020617;
font-size:.8rem;
font-weight:900;
z-index:3;
}

.play-btn{
margin-top:14px;
border:none;
border-radius:18px;
padding:12px;
font-size:1rem;
font-weight:bold;
cursor:pointer;
background:white;
color:black;
transition:.3s;
position:relative;
z-index:5;
width:100%;
}

.active-tile .play-btn{
background:linear-gradient(90deg,#facc15,#fde68a)!important;
color:#020617!important;
}

.active-tile{
box-shadow:0 0 25px 6px rgba(255,255,255,.7)!important;
transform:scale(1.04);
}

.remote-focus{
outline:5px solid #fff;
outline-offset:4px;
transform:scale(1.04);
box-shadow:0 0 30px rgba(255,255,255,.9);
z-index:10;
}

/* ================= ENGINE STAGES ================= */
.stage{
position:relative;
width:100%;
min-height:62vh;
border-radius:32px;
overflow:hidden;
background-size:cover!important;
background-position:center!important;
box-shadow:0 0 35px rgba(255,255,255,.18);
display:flex;
align-items:flex-end;
justify-content:center;
padding:24px;
}

.stage-content{
width:min(900px,100%);
text-align:center;
padding:22px;
border-radius:26px;
background:rgba(15,23,42,.45);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,255,255,.18);
}

.stage-title{
font-size:clamp(2rem,5vw,4.5rem);
font-weight:900;
margin-bottom:8px;
}

.stage-sub{
font-size:clamp(1.1rem,2.5vw,2rem);
opacity:.95;
}

.stage-badges{
margin-top:18px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

.rakah-badge{
padding:12px 16px;
border-radius:999px;
background:linear-gradient(135deg,#fff7ed,#fde68a);
color:#111827;
font-weight:900;
font-size:clamp(1rem,2vw,1.4rem);
box-shadow:0 0 15px rgba(255,255,255,.4);
animation:badgePop .8s ease;
}

@keyframes badgePop{
0%{transform:scale(.2);opacity:0;}
65%{transform:scale(1.1);opacity:1;}
100%{transform:scale(1);}
}

.story-dawn{background:linear-gradient(rgba(255,182,193,.28),rgba(15,23,42,.35));}
.story-bright-day{background:linear-gradient(rgba(250,204,21,.25),rgba(14,165,233,.18));}
.story-afternoon{background:linear-gradient(rgba(251,146,60,.22),rgba(15,23,42,.28));}
.story-sunset{background:linear-gradient(rgba(249,115,22,.38),rgba(124,45,18,.28));}
.story-night{background:linear-gradient(rgba(30,64,175,.42),rgba(2,6,23,.55));}

.story-overlay{
position:absolute;
inset:0;
pointer-events:none;
z-index:0;
transition:background 1s ease;
}

.spotlight-wrap{
position:relative;
display:flex;
align-items:center;
justify-content:center;
min-height:62vh;
border-radius:32px;
overflow:hidden;
background-size:contain!important;
background-position:center!important;
background-repeat:no-repeat!important;
background-color:rgba(15,23,42,.55);
box-shadow:0 0 35px rgba(255,255,255,.18);
}

.spotlight-number{
position:absolute;
font-size:clamp(4rem,15vw,11rem);
font-weight:900;
text-shadow:0 0 22px rgba(250,204,21,.9);
animation:spotlightPop 1.2s ease;
}

@keyframes spotlightPop{
0%{transform:scale(.35);opacity:0;}
50%{transform:scale(1.25);opacity:1;}
100%{transform:scale(1);opacity:1;}
}

/* ================= OVERLAY ================= */
#overlay{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.85);
z-index:999;
}

#overlay div{
background:white;
color:black;
padding:22px;
border-radius:20px;
font-size:1.2rem;
font-weight:bold;
text-align:center;
cursor:pointer;
box-shadow:0 0 25px rgba(255,255,255,.4);
}

audio{display:none;}

.credits{
position:fixed;
bottom:0;
left:0;
right:0;
padding:12px 8px;
text-align:center;
background:rgba(15,23,42,.25);
backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border-top:1px solid rgba(255,255,255,.08);
z-index:1000;
width:100%;
line-height:1.4;
font-weight:bold;
box-shadow:0 -4px 30px rgba(0,0,0,.2);
}

body.tv-mode .credits{
position:fixed!important;
bottom:0!important;
left:0!important;
right:0!important;
background:rgba(15,23,42,.85)!important;
}

.amtun{
display:inline-block;
font-family:cursive;
font-size:1.5rem;
font-weight:900;
letter-spacing:3px;
text-transform:uppercase;
background:linear-gradient(90deg,red,orange,yellow,lime,cyan,blue,violet,red);
background-size:400% 100%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbowSparkle 5s linear infinite;
}

@keyframes rainbowSparkle{
0%{background-position:0% 50%;filter:drop-shadow(0 0 4px rgba(255,255,255,.3));}
100%{background-position:400% 50%;filter:drop-shadow(0 0 10px rgba(255,255,255,.6));}
}

body>*{position:relative;z-index:1;}

@media(max-width:768px){
.stage{min-height:58vh;padding:14px;border-radius:24px;}
.stage-content{padding:16px;border-radius:20px;}
.stage-badges{flex-direction:column;align-items:center;}
.rakah-badge{width:100%;max-width:260px;}
}
</style>
</head>

<body>
<div class="stars"></div>

<h1 id="pageTitle">🌙 Mariam & Hamza's 🌙 </h1>
<p class="subtitle" id="pageSubtitle">✨Quran Adventures with Mom!✨</p>

<div class="topbar" id="topbar">
<button id="btnBack" tabindex="0" onclick="goHome()">🏠 Home</button>
<button id="btnStop" tabindex="0" onclick="stopAll()">⏹ Stop</button>
<button id="loopBtn" tabindex="0" onclick="toggleLoopAll()">🔁 Loop OFF</button>
<select id="mode" tabindex="0">
<option value="listen" selected>🎧 Listen</option>
<option value="repeat5">🔁 5x</option>
<option value="hifz">🧠 Hifz</option>
</select>
</div>

<div class="grid" id="grid"></div>

<div id="overlay">
<div>▶ Tap Anywhere / Press OK To Start</div>
</div>

<div class="credits">
<div>Created by</div>
<div class="amtun">AMTUN NOOR</div>
<div>May 2026</div>
</div>

<script>
/* =========================================================
   PRISM V3.4 LOCKABLE INDEX ENGINE
   - Quran/Salah protected
   - Plugin engines reusable: directAudio, spotlight, story, gallery
   ========================================================= */

const surahs = [
{id:"A1",name:"الفاتحة",eng:"Al Fatiha",emoji:"🌟",file:"A5.mp3",color:"linear-gradient(135deg,#f59e0b,#ef4444)"},
{id:"A2",name:"الإخلاص",eng:"Al Ikhlas",emoji:"💖",file:"A6.mp3",color:"linear-gradient(135deg,#ec4899,#8b5cf6)"},
{id:"A3",name:"الفلق",eng:"Al Falaq",emoji:"🌙",file:"A7.mp3",color:"linear-gradient(135deg,#06b6d4,#3b82f6)"},
{id:"A4",name:"الناس",eng:"An Naas",emoji:"⭐",file:"A8.mp3",color:"linear-gradient(135deg,#10b981,#14b8a6)"},
{id:"A5",name:"الفيل",eng:"Al Feel",emoji:"🐘",file:"A9.mp3",color:"linear-gradient(135deg,#8b5cf6,#6366f1)"},
{id:"A6",name:"قريش",eng:"Quraish",emoji:"🕋",file:"A10.mp3",color:"linear-gradient(135deg,#0ea5e9,#2563eb)"},
{id:"A7",name:"الماعون",eng:"Al Ma'un",emoji:"🤲",file:"A11.mp3",color:"linear-gradient(135deg,#14b8a6,#22c55e)"},
{id:"A8",name:"الكوثر",eng:"Al Kawther",emoji:"💧",file:"A12.mp3",color:"linear-gradient(135deg,#f97316,#fb7185)"},
{id:"A9",name:"الكافرون",eng:"Al Kafiroon",emoji:"☀️",file:"A13.mp3",color:"linear-gradient(135deg,#84cc16,#22c55e)"},
{id:"A10",name:"النصر",eng:"An Nasr",emoji:"🏆",file:"A14.mp3",color:"linear-gradient(135deg,#38bdf8,#818cf8)"},
{id:"A11",name:"المسد",eng:"Al Masad",emoji:"🔥",file:"A15.mp3",color:"linear-gradient(135deg,#ef4444,#f97316)"},
{id:"A12",name:"تكبير",eng:"Takbir",emoji:"🕌",file:"A16.mp3",color:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
{id:"A13",name:"الأذان",eng:"Azan",emoji:"📢",file:"A17.mp3",color:"linear-gradient(135deg,#06b6d4,#0ea5e9)"},
{id:"A14",name:"الكلمة الثانية",eng:"Second Kalima",emoji:"🌹",file:"A18.mp3",color:"linear-gradient(135deg,#14b8a6,#0f766e)"},
{id:"A15",name:"الضحى",eng:"Ad Duha",emoji:"☀️",file:"A19.mp3",color:"linear-gradient(135deg,#facc15,#fb7185)"},
{id:"A16",name:"إِنَّ الْمُسْلِمِينَ",eng:"Innal Muslimeena",emoji:"💚",file:"A20.mp3",color:"linear-gradient(135deg,#22c55e,#16a34a)"}
];

const FALLBACK_MENU = [
{title:"Quran",mainUrl:"file:///data/user/0/com.noor.prism/files/quran/index.html?id=A1",plugin:{id:"quran",title:"Quran",theme:"quran",engine:"learning"}},
{title:"Salah",mainUrl:"https://busymommh.github.io/SalahSteps/SalahStepsIndex.html",plugin:{id:"salah",title:"Salah",theme:"salah",engine:"external"}},
{title:"Dua",mainUrl:"index.html?plugin=dua",plugin:{id:"dua",title:"Dua",folder:"dua",theme:"dua",engine:"gallery",supports:["listen"]}},
{title:"Islamic Months",mainUrl:"index.html?plugin=months&autoplay=1",plugin:{id:"months",title:"Islamic Months",folder:"months",theme:"months",engine:"directAudio",playFromLanding:true,supports:["listen"]}},
{title:"Allah Names",mainUrl:"index.html?plugin=names",plugin:{id:"names",title:"Allah Names",folder:"names",theme:"names",engine:"spotlight",supports:["listen","repeat5"],chunkMode:{enabled:true,namesPerChunk:4,repeatCount:5}}}
];

const THEME = {
quran:["#f59e0b","#ef4444","📖"],
salah:["#22c55e","#0ea5e9","🕌"],
dua:["#f472b6","#8b5cf6","🤲"],
months:["#38bdf8","#6366f1","🗓"],
names:["#facc15","#fb7185","ﷲ"],
numbers:["#f97316","#22c55e","🔢"],
"allah-names":["#facc15","#fb7185","ﷲ"],
"salah-names":["#fb923c","#1d4ed8","🌙"],
angels:["#e0f2fe","#a78bfa","🕊"],
default:["#a78bfa","#22d3ee","✨"]
};

const DEFAULT_PALETTE = [
"linear-gradient(135deg,#f97316,#facc15)",
"linear-gradient(135deg,#22c55e,#14b8a6)",
"linear-gradient(135deg,#38bdf8,#6366f1)",
"linear-gradient(135deg,#ec4899,#8b5cf6)",
"linear-gradient(135deg,#ef4444,#fb7185)",
"linear-gradient(135deg,#84cc16,#06b6d4)",
"linear-gradient(135deg,#a855f7,#f472b6)",
"linear-gradient(135deg,#0ea5e9,#22c55e)"
];

const TV = {
cols: window.innerWidth <= 768 ? 2 : 4,
focused: 0,
isTV: /Android TV|TV|SmartTV|MiTV/i.test(navigator.userAgent) || !("ontouchstart" in window)
};

if(TV.isTV && window.innerWidth > 768){document.body.classList.add("tv-mode");}

window.addEventListener("resize",()=>{
TV.cols = window.innerWidth <= 768 ? 2 : 4;
if(TV.isTV && window.innerWidth > 768){document.body.classList.add("tv-mode");}
else{document.body.classList.remove("tv-mode");}
});

const grid = document.getElementById("grid");
const map = {};
let items = [];
let menuData = [];
let slicesData = {};
let currentAudio = null;
let currentButton = null;
let currentCard = null;
let currentItem = null;
let loopAll = false;
let currentView = "landing";
let currentPlugin = null;
let sequenceCancelToken = 0;
let storyTimer = null;

function params(){return new URLSearchParams(location.search);}
function getMode(){return document.getElementById("mode").value;}

function speak(text){
try{
const u = new SpeechSynthesisUtterance(text);
u.rate = .9;
speechSynthesis.cancel();
speechSynthesis.speak(u);
}catch(e){}
}

async function fetchJson(url,fallback){
try{
const res = await fetch(url,{cache:"no-store"});
if(!res.ok) throw new Error("not found");
return await res.json();
}catch(e){return fallback;}
}

function gradientFor(theme){
const t = THEME[theme] || THEME.default;
return `linear-gradient(135deg,${t[0]},${t[1]})`;
}

function iconFor(theme){
return (THEME[theme] || THEME.default)[2];
}

function assetUrl(path){
if(!path || typeof path !== "string") return "";
return path;
}

function applyImageOrGradient(card, image, theme){
if(typeof image === "string" && image.trim()){
card.style.backgroundImage = `linear-gradient(rgba(2,6,23,.08),rgba(2,6,23,.25)), url('${assetUrl(image)}')`;
card.style.backgroundColor = "transparent";
} else if(image && image.type === "gradient" && Array.isArray(image.colors)){
card.style.background = `linear-gradient(135deg,${image.colors.join(",")})`;
} else {
card.style.background = gradientFor(theme);
}
}

function setHeader(title, subtitle){
document.getElementById("pageTitle").innerText = title;
document.getElementById("pageSubtitle").innerText = subtitle;
}

function setTopbar(show, showHome){
document.getElementById("topbar").style.display = show ? "flex" : "none";
document.getElementById("btnBack").style.display = showHome ? "inline-block" : "none";
}

function clearGrid(){
Object.keys(map).forEach(k=>delete map[k]);
items = [];
grid.innerHTML = "";
TV.focused = 0;
clearTimers();
}

function clearTimers(){
sequenceCancelToken++;
if(storyTimer){ clearTimeout(storyTimer); storyTimer = null; }
}

/* ================= LANDING PAGE ================= */
function buildLanding(){
currentView = "landing";
currentPlugin = null;
document.body.classList.add("landing-mode");
clearGrid();
stopAll(false);
setHeader("🌙 Mariam & Hamza's 🌙","✨Choose Your Prism Adventure!✨");
setTopbar(false,false);

const cards = menuData.length ? menuData : FALLBACK_MENU;

cards.forEach((entry,idx)=>{
const plugin = entry.plugin || {};
const id = plugin.id || entry.title.toLowerCase().replace(/\s+/g,"-");
const theme = plugin.theme || id || "default";
const card = document.createElement("div");
card.className = "card";
applyImageOrGradient(card, plugin.tileImage, theme);

const buttonText = plugin.playFromLanding || plugin.engine === "directAudio" ? "▶ Play" : "▶ Open";
card.innerHTML = `
<div class="card-info-box">
  <div class="emoji">${iconFor(theme)}</div>
  <div class="arabic">${entry.title}</div>
  <div class="english">${engineLabel(plugin)}</div>
</div>
<button class="play-btn">${buttonText}</button>
`;
card.onclick = ()=>openMenuEntry(entry);
card.querySelector("button").onclick = (e)=>{e.stopPropagation();openMenuEntry(entry);};
grid.appendChild(card);
const item = {id,entry,card,index:idx,type:"landing"};
items.push(item);
map[id] = item;
});
updateFocus();
}

function engineLabel(plugin){
if(plugin.engine === "directAudio") return "Tap to play";
if(plugin.engine === "spotlight") return "Spotlight Learning";
if(plugin.engine === "story") return "Story Mode";
if(plugin.engine === "gallery") return "Gallery";
if(plugin.engine === "learning") return "Learning";
if(plugin.engine === "external") return "Open Salah";
return "Open";
}

function openMenuEntry(entry){
const plugin = entry.plugin || {};
const id = plugin.id;

if(id === "quran" || entry.title === "Quran"){
history.pushState(null,"","?plugin=quran");
buildQuran();
return;
}

if(id === "salah" || entry.title === "Salah"){
if(entry.mainUrl){ location.href = entry.mainUrl; }
return;
}

if(plugin.playFromLanding || plugin.engine === "directAudio"){
history.pushState(null,"",`?plugin=${encodeURIComponent(id)}&autoplay=1`);
buildPlugin(plugin,true);
return;
}

if(id){
history.pushState(null,"",`?plugin=${encodeURIComponent(id)}`);
buildPlugin(plugin,false);
return;
}

if(entry.mainUrl){ location.href = entry.mainUrl; }
}

function goHome(){
history.pushState(null,"","index.html");
buildLanding();
}

/* ================= QURAN VIEW ================= */
function buildQuran(){
currentView = "quran";
currentPlugin = {id:"quran",title:"Quran",theme:"quran",engine:"learning"};
document.body.classList.remove("landing-mode");
setHeader("🌙 Mariam & Hamza's 🌙","✨Quran Adventures with Mom!✨");
setTopbar(true,true);
renderQuranItems();
}

function renderQuranItems(){
const mode = getMode();
clearGrid();
stopAll(false);

let source = surahs;

if(mode === "repeat5" || mode === "hifz"){
const learnKeys = Object.keys(slicesData || {}).filter(k=>k.startsWith("learn/") && k.endsWith(".mp3"));
source = learnKeys.map((key,idx)=>{
const num = key.split("/").pop().replace(".mp3","");
return {
id:num,
name:`سورة ${num}`,
eng:`Surah ${num}`,
emoji:"🎓",
file:key,
color:"linear-gradient(135deg,#facc15,#fb7185)",
learnKey:key,
slices:slicesData[key],
index:idx
};
});
if(!source.length){
source = surahs;
}
}

source.forEach((s,idx)=>createAudioCard(s,idx,"quran", false));
updateFocus();

const requested = params().get("id") || params().get("surah");
if(requested && map[requested]){
TV.focused = map[requested].index;
qrFix();
}
}

/* ================= PLUGIN ROUTER ================= */
function buildPlugin(plugin, autoplay){
currentView = "plugin";
currentPlugin = plugin;
document.body.classList.remove("landing-mode");
const title = plugin.title || plugin.id || "Prism";
setHeader(`✨ ${title} ✨`, subtitleForEngine(plugin));
setTopbar(true,true);

const engine = plugin.engine || "gallery";
if(engine === "directAudio") return buildDirectAudio(plugin, autoplay);
if(engine === "spotlight") return buildSpotlight(plugin, autoplay);
if(engine === "story") return buildStory(plugin, autoplay);
return buildGallery(plugin, autoplay);
}

function subtitleForEngine(plugin){
if(plugin.engine === "directAudio") return "Tap once and listen!";
if(plugin.engine === "spotlight") return "Watch the focus glow and learn!";
if(plugin.engine === "story") return "A gentle story through the day!";
return "Listen, learn and enjoy!";
}

function pluginEntry(plugin){
return menuData.find(m => (m.plugin||{}).id === plugin.id) || {};
}

function pluginMp3s(plugin){
const folder = plugin.folder || plugin.id;
const syncFiles = pluginEntry(plugin).syncFiles || [];
let mp3s = [];
if(Array.isArray(plugin.audios) && plugin.audios.length) mp3s = plugin.audios;
else mp3s = syncFiles.map(f=>f.path).filter(p=>p && p.startsWith(folder + "/") && /\.mp3$/i.test(p));
if(!mp3s.length && plugin.primaryAudio) mp3s = [plugin.primaryAudio];
return [...new Set(mp3s)];
}

function pluginImages(plugin){
const folder = plugin.folder || plugin.id;
const syncFiles = pluginEntry(plugin).syncFiles || [];
let imgs = [];
if(Array.isArray(plugin.images) && plugin.images.length) imgs = plugin.images;
else imgs = syncFiles.map(f=>f.path).filter(p=>p && p.startsWith(folder + "/") && /\.(png|jpg|jpeg|webp|gif|svg)$/i.test(p));
if(plugin.backgroundImage && typeof plugin.backgroundImage === "string") imgs.unshift(plugin.backgroundImage);
if(plugin.tileImage && typeof plugin.tileImage === "string") imgs.unshift(plugin.tileImage);
return [...new Set(imgs)];
}

/* ================= DIRECT AUDIO ENGINE ================= */
function buildDirectAudio(plugin, autoplay){
clearGrid();
const mp3s = pluginMp3s(plugin);
const audioFile = plugin.primaryAudio || mp3s[0];
const theme = plugin.theme || plugin.id;
if(!audioFile) return renderComingSoon(plugin, `Add audio in ${plugin.folder || plugin.id}/`);

const item = {
id:plugin.id,
name:plugin.title,
eng:"Playing directly",
emoji:iconFor(theme),
file:audioFile,
color:gradientFor(theme),
plugin
};
createAudioCard(item,0,theme,false);
updateFocus();
if(autoplay || params().get("autoplay") === "1"){
setTimeout(()=>play(plugin.id),400);
}
}

/* ================= GALLERY ENGINE ================= */
function buildGallery(plugin, autoplay){
clearGrid();
const mp3s = pluginMp3s(plugin);
if(!mp3s.length) return renderComingSoon(plugin, `Add audio files in ${plugin.folder || plugin.id}/`);

mp3s.forEach((file,idx)=>{
const clean = file.split("/").pop().replace(/\.(mp3|m4a|wav|ogg)$/i,"").replace(/[-_]/g," ");
const item = {
id:`${plugin.id}-${idx}`,
name:plugin.title,
eng:clean,
emoji:iconFor(plugin.theme || plugin.id),
file,
color:(plugin.tilePalette || DEFAULT_PALETTE)[idx % (plugin.tilePalette || DEFAULT_PALETTE).length],
slices:slicesData[file] || null,
plugin
};
createAudioCard(item,idx,plugin.theme || plugin.id,false);
});
updateFocus();
if(autoplay && items[0]) setTimeout(()=>play(items[0].id),400);
}

/* ================= SPOTLIGHT ENGINE ================= */
function buildSpotlight(plugin, autoplay){
clearGrid();
const mp3s = pluginMp3s(plugin);
const theme = plugin.theme || plugin.id;

if(plugin.id === "names" && mp3s.length){
mp3s.forEach((file,idx)=>{
const label = file.split("/").pop().replace(/\.(mp3|m4a|wav|ogg)$/i,"").replace("_","–");
const item = {
id:`${plugin.id}-${idx}`,
name:"ﷲ",
eng:label,
emoji:"✨",
file,
color:(plugin.tilePalette || DEFAULT_PALETTE)[idx % (plugin.tilePalette || DEFAULT_PALETTE).length],
slices:slicesData[file] || null,
plugin
};
createAudioCard(item,idx,theme,false);
});
updateFocus();
return;
}

const audioFile = plugin.primaryAudio || mp3s[0];
if(!audioFile) return renderComingSoon(plugin, `Add audio in ${plugin.folder || plugin.id}/`);

const wrap = document.createElement("div");
wrap.className = "spotlight-wrap";
const bg = typeof plugin.backgroundImage === "string" ? plugin.backgroundImage : (typeof plugin.tileImage === "string" ? plugin.tileImage : "");
wrap.style.background = bg ? `url('${bg}')` : gradientFor(theme);
wrap.innerHTML = `<div class="spotlight-number" id="spotlightText">${iconFor(theme)}</div><audio id="spotlightAudio" src="${audioFile}" preload="auto"></audio>`;
grid.appendChild(wrap);

const fakeCard = wrap;
const audio = wrap.querySelector("audio");
const item = {id:plugin.id,card:fakeCard,audio,btn:null,s:{...plugin,file:audioFile,name:plugin.title,eng:"Spotlight"},index:0,type:"audio"};
items.push(item);
map[plugin.id] = item;

fakeCard.onclick = ()=>play(plugin.id);
updateFocus();
if(autoplay) setTimeout(()=>play(plugin.id),400);
}

/* ================= STORY ENGINE ================= */
function buildStory(plugin, autoplay){
clearGrid();
const theme = plugin.theme || plugin.id;
const mp3s = pluginMp3s(plugin);
const audioFile = plugin.primaryAudio || mp3s[0] || "";
const seq = Array.isArray(plugin.sequence) && plugin.sequence.length ? plugin.sequence : defaultSalahNamesSequence();

const stage = document.createElement("div");
stage.className = "stage";
const bg = typeof plugin.backgroundImage === "string" ? plugin.backgroundImage : (typeof plugin.tileImage === "string" ? plugin.tileImage : "");
stage.style.background = bg ? `url('${bg}')` : gradientFor(theme);
stage.innerHTML = `
<div class="story-overlay story-dawn" id="storyOverlay"></div>
<div class="stage-content">
  <div class="stage-title" id="storyArabic">${seq[0].arabic || ""}</div>
  <div class="stage-sub" id="storyName">${seq[0].name || plugin.title}</div>
  <div class="stage-badges" id="storyBadges"></div>
</div>
${audioFile ? `<audio id="storyAudio" src="${audioFile}" preload="auto"></audio>` : ""}
`;
grid.appendChild(stage);

const audio = stage.querySelector("audio");
const item = {id:plugin.id,card:stage,audio,btn:null,s:{...plugin,file:audioFile,name:plugin.title,eng:"Story"},index:0,type:audio ? "audio" : "story"};
items.push(item);
map[plugin.id] = item;
stage.onclick = ()=>{ if(audio) play(plugin.id); runStorySequence(seq); };
updateFocus();
renderStoryStep(seq[0]);
if(autoplay){ setTimeout(()=>{ if(audio) play(plugin.id); runStorySequence(seq); },400); }
}

function defaultSalahNamesSequence(){
return [
{name:"Fajr",arabic:"الفجر",effect:"dawn",rakah:["2 Sunnah","2 Fard"]},
{name:"Dhuhr",arabic:"الظهر",effect:"bright-day",rakah:["4 Sunnah","4 Fard","2 Sunnah"]},
{name:"Asr",arabic:"العصر",effect:"afternoon",rakah:["4 Fard"]},
{name:"Maghrib",arabic:"المغرب",effect:"sunset",rakah:["3 Fard","2 Sunnah"]},
{name:"Isha",arabic:"العشاء",effect:"night",rakah:["4 Fard","2 Sunnah","Witr"]}
];
}

function runStorySequence(seq){
clearTimeout(storyTimer);
let i=0;
const step=()=>{
renderStoryStep(seq[i % seq.length]);
i++;
storyTimer = setTimeout(step,4200);
};
step();
}

function renderStoryStep(step){
const overlay = document.getElementById("storyOverlay");
const arabic = document.getElementById("storyArabic");
const name = document.getElementById("storyName");
const badges = document.getElementById("storyBadges");
if(!overlay || !arabic || !name || !badges) return;
overlay.className = "story-overlay story-" + (step.effect || "dawn");
arabic.innerText = step.arabic || "";
name.innerText = step.name || "";
badges.innerHTML = (step.rakah || []).map(r=>`<div class="rakah-badge">${r}</div>`).join("");
}

/* ================= CARD RENDERER ================= */
function createAudioCard(s, idx, theme, showLearnBadge){
const card = document.createElement("div");
card.className = "card";
card.style.background = s.color || gradientFor(theme);

const badge = showLearnBadge && s.slices ? `<div class="badge">🎓 Learn</div>` : "";

card.innerHTML = `
${badge}
<div class="card-info-box">
  <div class="emoji">${s.emoji || iconFor(theme)}</div>
  <div class="arabic">${s.name || s.eng}</div>
  <div class="english">${s.eng || s.file}</div>
</div>
<button class="play-btn">⏸ Pause</button>
<audio src="${s.file}" preload="auto"></audio>
`;

const btn = card.querySelector("button");
const audio = card.querySelector("audio");

const item = {card,audio,btn,s,index:idx,id:s.id,type:"audio"};
items.push(item);
map[s.id] = item;

card.onclick = ()=>{
TV.focused = idx;
updateFocus();
play(s.id);
};

btn.onclick = (e)=>{
e.stopPropagation();
pauseCurrent();
};

grid.appendChild(card);
}

function renderComingSoon(plugin,msg){
clearGrid();
const theme = plugin.theme || plugin.id;
const card = document.createElement("div");
card.className = "card";
applyImageOrGradient(card, plugin.tileImage, theme);
card.innerHTML = `
<div class="card-info-box">
  <div class="emoji">${iconFor(theme)}</div>
  <div class="arabic">${plugin.title || plugin.id}</div>
  <div class="english">${msg}</div>
</div>
<button class="play-btn">✨ Coming Soon</button>
`;
grid.appendChild(card);
const item = {id:plugin.id,card,index:0,type:"empty"};
items.push(item);
map[plugin.id]=item;
updateFocus();
}

/* ================= AUDIO + LEARN/HIFZ ================= */
function play(id){
const item = map[id];
if(!item || item.type !== "audio") return;

sequenceCancelToken++;
const token = sequenceCancelToken;

if(currentAudio && currentAudio !== item.audio){
currentAudio.pause();
currentAudio.currentTime = 0;
if(currentCard) currentCard.classList.remove("active-tile");
}

currentAudio = item.audio;
currentButton = item.btn;
currentCard = item.card;
currentItem = item;

item.card.classList.add("active-tile");

const mode = getMode();
const hasSlices = Array.isArray(item.s.slices) && item.s.slices.length;

if((mode === "repeat5" || mode === "hifz") && hasSlices){
runLearningSequence(item, mode, token);
} else {
item.audio.loop = loopAll;
item.audio.play().catch(()=>{});
}

speak(item.s.name || item.s.eng || "");
}

function toSeconds(t){
if(typeof t === "number") return t;
const parts = String(t).split(":").map(Number);
if(parts.length === 2) return parts[0]*60 + parts[1];
if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
return Number(t) || 0;
}

function playSegment(audio,start,end,token){
return new Promise(resolve=>{
if(token !== sequenceCancelToken) return resolve();
audio.pause();
audio.currentTime = Math.max(0,start);
audio.play().catch(()=>resolve());
const tick = ()=>{
if(token !== sequenceCancelToken){
audio.removeEventListener("timeupdate",tick);
return resolve();
}
if(audio.currentTime >= end){
audio.pause();
audio.removeEventListener("timeupdate",tick);
resolve();
}
};
audio.addEventListener("timeupdate",tick);
});
}

async function runLearningSequence(item, mode, token){
const audio = item.audio;
const ends = item.s.slices.map(toSeconds);
const starts = [0].concat(ends.slice(0,-1));
const repeat = ((item.s.plugin || {}).chunkMode || {}).repeatCount || 5;

if(mode === "repeat5"){
for(let i=0;i<ends.length;i++){
for(let r=0;r<repeat;r++){
if(token !== sequenceCancelToken) return;
await playSegment(audio,starts[i],ends[i],token);
await sleep(250);
}
}
}

if(mode === "hifz"){
for(let upto=0;upto<ends.length;upto++){
for(let r=0;r<repeat;r++){
if(token !== sequenceCancelToken) return;
await playSegment(audio,starts[upto],ends[upto],token);
await sleep(250);
}
if(token !== sequenceCancelToken) return;
await playSegment(audio,0,ends[upto],token);
await sleep(450);
}
}

if(loopAll && token === sequenceCancelToken){
runLearningSequence(item,mode,token);
}
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function pauseCurrent(){
sequenceCancelToken++;
if(currentAudio){ currentAudio.pause(); }
}

function stopAll(clearFocus=true){
sequenceCancelToken++;
if(currentAudio){
currentAudio.pause();
currentAudio.currentTime = 0;
}
if(currentCard) currentCard.classList.remove("active-tile");
currentAudio = null;
currentButton = null;
currentCard = null;
currentItem = null;
if(clearFocus) updateFocus();
}

function toggleLoopAll(){
loopAll = !loopAll;
document.getElementById("loopBtn").innerText = loopAll ? "🔁 Loop ON" : "🔁 Loop OFF";
if(currentAudio) currentAudio.loop = loopAll;
}

document.getElementById("mode").addEventListener("change",()=>{
if(currentView === "quran") renderQuranItems();
});

/* ================= GRID D-PAD NAVIGATION ENGINE ================= */
function move(dir){
const max = items.length - 1;
if(max < 0) return;

if(dir === "right") TV.focused = Math.min(max,TV.focused + 1);
if(dir === "left") TV.focused = Math.max(0,TV.focused - 1);
if(dir === "down") TV.focused = Math.min(max,TV.focused + TV.cols);
if(dir === "up") TV.focused = Math.max(0,TV.focused - TV.cols);

updateFocus();
}

function updateFocus(){
const cards = document.querySelectorAll(".card,.stage,.spotlight-wrap");
cards.forEach(c=>c.classList.remove("remote-focus"));

const el = cards[TV.focused];
if(!el) return;

el.classList.add("remote-focus");

if(TV.isTV){
el.scrollIntoView({block:"center",behavior:"smooth"});
}
}

/* ================= OVERLAY DISMISSAL ================= */
function handleOverlayDismissal(){
const overlay = document.getElementById("overlay");
if(overlay && overlay.style.display !== "none"){
const id = params().get("id") || params().get("surah");
if(id && map[id]) play(id);
overlay.style.display = "none";
return true;
}
return false;
}

/* ================= SYSTEM CONTROL EVENT RECEPTORS ================= */
document.addEventListener("keydown",(e)=>{
const k = e.keyCode;
const activeEl = document.activeElement;

if(document.getElementById("overlay").style.display === "flex"){
const okKeys = ["Enter","NumpadEnter"," ","OK","Select"];
if(k===23 || k===66 || okKeys.includes(e.key) || k===19 || k===20 || k===21 || k===22 || (e.key||"").startsWith("Arrow")){
e.preventDefault();
handleOverlayDismissal();
return;
}
}

if(activeEl && (activeEl.id==="btnBack" || activeEl.id==="btnStop" || activeEl.id==="loopBtn" || activeEl.id==="mode")){
if(k===22 || e.key==="ArrowRight"){
e.preventDefault();
if(activeEl.id==="btnBack") document.getElementById("btnStop").focus();
else if(activeEl.id==="btnStop") document.getElementById("loopBtn").focus();
else if(activeEl.id==="loopBtn") document.getElementById("mode").focus();
}
if(k===21 || e.key==="ArrowLeft"){
e.preventDefault();
if(activeEl.id==="btnStop" && document.getElementById("btnBack").style.display !== "none") document.getElementById("btnBack").focus();
else if(activeEl.id==="loopBtn") document.getElementById("btnStop").focus();
else if(activeEl.id==="mode") document.getElementById("loopBtn").focus();
}
if(k===20 || e.key==="ArrowDown"){
e.preventDefault();
activeEl.blur();
updateFocus();
}
return;
}

if(k===21 || e.key==="ArrowLeft"){
e.preventDefault();
if(TV.focused % TV.cols === 0) return;
move("left");
}

if(k===22 || e.key==="ArrowRight"){
e.preventDefault();
if((TV.focused + 1) % TV.cols === 0) return;
move("right");
}

if(k===20 || e.key==="ArrowDown"){
e.preventDefault();
move("down");
}

if(k===19 || e.key==="ArrowUp"){
e.preventDefault();
if(TV.focused < TV.cols && currentView !== "landing"){
const cards = document.querySelectorAll(".card,.stage,.spotlight-wrap");
cards.forEach(c=>c.classList.remove("remote-focus"));
const first = document.getElementById("btnBack").style.display !== "none" ? "btnBack" : "btnStop";
document.getElementById(first).focus();
} else {
move("up");
}
}

const okKeys = ["Enter","NumpadEnter"," ","OK","Select"];
if(k===23 || k===66 || okKeys.includes(e.key)){
if(activeEl && !activeEl.closest(".topbar")){
e.preventDefault();
const item = items[TV.focused];
if(!item) return;
if(item.type === "landing") openMenuEntry(item.entry);
else if(item.type === "audio") play(item.id);
else if(item.type === "story") runStorySequence(defaultSalahNamesSequence());
}
}
});

for(let i=0;i<80;i++){

d.className = "star";

/* ================= QR LINK HANDLING ================= */
function qrFix(){
const id = params().get("id") || params().get("surah");

if(!id || !map[id]){
updateFocus();
return;
}

const item = map[id];
TV.focused = item.index;

setTimeout(()=>{
item.card.classList.add("active-tile");
item.card.scrollIntoView({behavior:"smooth",block:"center"});

currentCard = item.card;
currentAudio = item.audio;
currentButton = item.btn;
currentItem = item;

document.getElementById("overlay").style.display = "flex";
setTimeout(()=>speak(item.s.name),600);
updateFocus();
},500);
}

document.getElementById("overlay").onclick = ()=>handleOverlayDismissal();

window.addEventListener("popstate",()=>route());

async function route(){
menuData = await fetchJson("menu.json", FALLBACK_MENU);
slicesData = await fetchJson("slices.json", {});

const p = params();
const id = p.get("id") || p.get("surah");
const pluginId = p.get("plugin");

if(id){
buildQuran();
return;
}

if(pluginId && pluginId !== "landing"){
const foundEntry = menuData.find(m => (m.plugin||{}).id === pluginId);
const found = foundEntry ? foundEntry.plugin : null;
if(pluginId === "quran") buildQuran();
else if(pluginId === "salah" && foundEntry && foundEntry.mainUrl) location.href = foundEntry.mainUrl;
else if(found) buildPlugin(found, p.get("autoplay") === "1");
else buildLanding();
return;
}

buildLanding();
}

window.addEventListener("load",route);
</script>
