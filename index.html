<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My Little Quran Corner!</title>

<meta name="theme-color" content="#0f172a"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-touch-callout: none;
-webkit-user-select: none;
user-select: none;
}

body{
background:radial-gradient(circle at top,#172554,#020617 70%);
height:100vh;
overflow:hidden;
color:white;
display:flex;
flex-direction:column;
cursor:none;
}


.stars{
position:fixed;
inset:0;
pointer-events:none;
z-index: 0; /* Keep strictly below everything */
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate, drift 25s linear infinite;
}

@keyframes twinkle{
0%{opacity:.2;transform:scale(.5);}
100%{opacity:1;transform:scale(1.5);}
}

@keyframes drift{
from{transform:translateY(0);}
to{transform:translateY(-120px);}
}

/* ================= TITLE ================= */
h1{
text-align:center;
font-size:clamp(1.5rem,3vh,3rem);
background:linear-gradient(90deg,#facc15,#38bdf8,#f472b6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #38bdf8);}
to{filter:drop-shadow(0 0 18px #f472b6);}
}

.subtitle{
text-align:center;
color:#cbd5e1;
font-size:clamp(.8rem,1.4vh,1.2rem);
margin-bottom:1vh;
}

/* ================= TOPBAR ================= */
.topbar{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:10px;
z-index: 10;
}

.topbar button,
.topbar select{
border:none;
padding:10px 14px;
border-radius:16px;
font-weight:bold;
background:linear-gradient(90deg,#facc15,#fde68a);
cursor: pointer;
}

/* ================= GRID SCROLL CONTAINER ================= */
.grid-container {
flex: 1;
width: 100%;
overflow-y: auto;
scroll-behavior: smooth;
/* Added padding-top to stop the top selection border from getting cut off */
padding: 15px 10px 20px 10px;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
z-index: 5;
}

.grid-container::-webkit-scrollbar {
display: none;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(4,1fr);
gap:1vh;
width:100%;
height: 100%;
}

/* ================= CARD (RESTORED EXACT ASPECT & RATIOS) ================= */
.card{
position:relative;
border-radius:24px;
padding:12px;
display:flex;
flex-direction:column;
justify-content:space-between;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(255,255,255,.1);
transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
aspect-ratio:1/1;
cursor: pointer;
}

.card:active{
transform:scale(.98);
}

/* RESTORED MAXIMIZED TEXT UTILIZATION PER TILE */
.emoji{font-size:clamp(1.2rem,2.2vh,2.4rem);}
.arabic{font-size:clamp(1rem,2.2vh,1.8rem);font-weight:bold;}
.english{font-size:clamp(.7rem,1.4vh,1rem);opacity:.9;}

/* ================= DYNAMIC PLAY / PAUSE HUD ICON ================= */
.card-status {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: clamp(24px, 4vh, 40px);
  height: clamp(24px, 4vh, 40px);
  border-radius: 50%;
  background: linear-gradient(90deg, #facc15, #fde68a); /* Match stop/loop buttons */
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.card-status svg {
  width: 50%;
  height: 50%;
  fill: #020617;
}

/* Show when actively playing */
.active-tile .card-status {
  opacity: 1;
  transform: scale(1);
}

/* ================= ANIMATED FOCUS TRANSITIONS ================= */
.remote-focus{
outline: 5px solid white;
outline-offset: 4px;
z-index:10;
transform:scale(1.05);
}

.active-tile{
animation:playPulse 1.5s infinite;
box-shadow:0 0 25px white;
}

@keyframes playPulse{
0%,100%{transform:scale(1.03);}
50%{transform:scale(1.08);}
}

/* ================= MAGIC FLOATING ICONS ================= */
.magic{
position:fixed;
font-size:20px;
animation:floatMagic 4s infinite ease-in-out;
opacity:.7;
pointer-events:none;
z-index: 1;
}

@keyframes floatMagic{
0%{transform:translateY(0);opacity:.2;}
50%{opacity:1;}
100%{transform:translateY(-30px);opacity:.2;}
}

/* ================= CREDITS (RAINBOW RESTORED) ================= */
.credits{
position:relative;
text-align:center;
padding:6px;
font-size:0.9rem;
background:rgba(0,0,0,.3);
z-index: 10;
}

.amtun{
font-family:cursive;
font-weight:900;
font-size:1.3rem;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rainbow 4s linear infinite;
background-size: 400% 100%;
}

@keyframes rainbow{
0%{background-position:0%;}
100%{background-position:400%;}
}
</style>
</head>

<body>

<div class="stars" id="starField"></div>

<h1>🌙 Mariam & Hamza's 🌙</h1>
<div class="subtitle">✨ Quran Adventures ✨</div>

<div class="topbar">
<button onclick="stopAll()">Stop</button>
<button onclick="toggleLoop()">Loop</button>
<select id="mode">
<option value="listen">Listen</option>
<option value="learn">Learn</option>
</select>
</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<div class="credits">
Created by <span class="amtun">AMTUN NOOR</span><br/>
May 2026
</div>

<script>
/* ================= DATA ENGINE ================= */

const surahs=[
{id:"A1",name:"الفاتحة",eng:"Al Fatiha",emoji:"🌟",file:"A5.mp3",color:"linear-gradient(135deg,#f59e0b,#ef4444)"},
{id:"A2",name:"الإخلاص",eng:"Al Ikhlas",emoji:"💖",file:"A6.mp3",color:"linear-gradient(135deg,#ec4899,#8b5cf6)"},
{id:"A3",name:"الفلق",eng:"Al Falaq",emoji:"🌙",file:"A7.mp3",color:"linear-gradient(135deg,#06b6d4,#3b82f6)"},
{id:"A4",name:"الناس",eng:"An Naas",emoji:"⭐",file:"A8.mp3",color:"linear-gradient(135deg,#10b981,#14b8a6)"},
{id:"A5",name:"الفيل",eng:"Al Feel",emoji:"🐘",file:"A9.mp3",color:"linear-gradient(135deg,#8b5cf6,#6366f1)"},
{id:"A6",name:"قريش",eng:"Quraish",emoji:"🕋",file:"A10.mp3",color:"linear-gradient(135deg,#0ea5e9,#2563eb)"},
{id:"A7",name:"الماعون",eng:"Al Ma'un",emoji:"🤲",file:"A11.mp3",color:"linear-gradient(135deg,#14b8a6,#22c55e)"},
{id:"A8",name:"الكوثر",eng:"Al Kawther",emoji:"💧",file:"A12.mp3",color:"linear-gradient(135deg,#f97316,#fb7185)"},
{id:"A9",name:"الكافرون",eng:"Al Kafiroon",emoji:"☀️",file:"A13.mp3",color:"linear-gradient(135deg,#84cc16,#22c55e)"},
{id:"A10",name:"النصر",eng:"An Nasr",emoji:"🏆",file:"A14.mp3",color:"linear-gradient(135deg,#38bdf8,#818cf8)"},
{id:"A11",name:"المسد",eng:"Al Masad",emoji:"🔥",file:"A15.mp3",color:"linear-gradient(135deg,#ef4444,#f97316)"},
{id:"A12",name:"تكبير",eng:"Takbir",emoji:"🕌",file:"A16.mp3",color:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
{id:"A13",name:"الأذان",eng:"Azan",emoji:"📢",file:"A17.mp3",color:"linear-gradient(135deg,#06b6d4,#0ea5e9)"},
{id:"A14",name:"الكلمة الثانية",eng:"Second Kalima",emoji:"🌹",file:"A18.mp3",color:"linear-gradient(135deg,#14b8a6,#0f766e)"},
{id:"A15",name:"الضحى",eng:"Ad Duha",emoji:"☀️",file:"A19.mp3",color:"linear-gradient(135deg,#facc15,#fb7185)"},
{id:"A16",name:"إِنَّ الْمُسْلِمِينَ",eng:"Innal Muslimeena",emoji:"💚",file:"A20.mp3",color:"linear-gradient(135deg,#22c55e,#16a34a)"}
];


/* ================= STATE & CONFIG ENGINE ================= */
const TV = {
  cols: 4,
  focused: 0,
  isTV: /Android TV|TV|SmartTV|MiTV/i.test(navigator.userAgent) || !("ontouchstart" in window)
};

let currentAudio = null;
let loop = false;

/* ================= RENDER ENGINE ================= */
const grid = document.getElementById("grid");

surahs.forEach((s, i) => {
  const c = document.createElement("div");
  c.className = "card";
  c.style.background = s.color;

  c.innerHTML = `
    <div>
      <div class="emoji">${s.emoji}</div>
      <div class="arabic">${s.name}</div>
      <div class="english">${s.eng}</div>
    </div>
    <div class="card-status">
      <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
    <audio src="${s.file}" preload="none"></audio>
  `;

  c.onclick = () => {
    TV.focused = i;
    updateFocus();
    play(i);
  };
  grid.appendChild(c);
});

/* ================= BACKGROUND TWINKLING STARS ENGINE (REDUCED & CLEAN) ================= */
const starField = document.getElementById("starField");
for(let i=0; i<15; i++) { // Kept light and clean so it doesn't look messy
  const star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * 100 + "vw";
  star.style.top = Math.random() * 100 + "vh";
  star.style.animationDelay = Math.random() * 3 + "s";
  starField.appendChild(star);
}

/* ================= PRELOAD BUFFER STRATEGY ================= */
function preloadBuffer(currentIndex) {
  const lookAhead = 2; 
  for (let i = 1; i <= lookAhead; i++) {
    let nextIndex = (currentIndex + i) % surahs.length;
    const cards = document.querySelectorAll(".card");
    if(cards[nextIndex]) {
      const audio = cards[nextIndex].querySelector("audio");
      if (audio && audio.preload !== "auto") audio.preload = "auto";
    }
  }
}

/* ================= AUDIO CONTROLS ================= */
function play(i) {
  const cards = [...document.querySelectorAll(".card")];
  cards.forEach(c => c.classList.remove("active-tile"));
  
  const item = cards[i].querySelector("audio");

  if (currentAudio) {
    currentAudio.pause();
  }

  currentAudio = item;
  if(currentAudio) {
    currentAudio.loop = loop;
    currentAudio.play().then(() => {
      cards[i].classList.add("active-tile");
    }).catch(e => console.log("Playback interaction registered:", e));
  }

  const mode = document.getElementById("mode").value;
  if (mode === "learn") {
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(surahs[i].name));
  }
}

/* ================= FOCUS INTERFACES ================= */
function move(dir){
  const max = surahs.length - 1;

  if(dir === "right") TV.focused = Math.min(max, TV.focused + 1);
  if(dir === "left")  TV.focused = Math.max(0, TV.focused - 1);
  if(dir === "down")  TV.focused = Math.min(max, TV.focused + TV.cols);
  if(dir === "up")    TV.focused = Math.max(0, TV.focused - TV.cols);

  updateFocus();
}

function updateFocus(){
  const cards = document.querySelectorAll(".card");
  cards.forEach(c => c.classList.remove("remote-focus"));

  const el = cards[TV.focused];
  if(!el) return;

  el.classList.add("remote-focus");
  preloadBuffer(TV.focused);

  el.scrollIntoView({
    block: "center",
    behavior: "smooth"
  });
}

function stopAll(){
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active-tile"));
}

function toggleLoop(){
  loop = !loop;
  if(currentAudio) currentAudio.loop = loop;
}

/* ================= EVENTS REGISTER ================= */
document.addEventListener("keydown",(e)=>{
  const k = e.keyCode;

  if(k === 21 || e.key === "ArrowLeft") move("left");
  if(k === 22 || e.key === "ArrowRight") move("right");
  if(k === 19 || e.key === "ArrowUp") move("up");
  if(k === 20 || e.key === "ArrowDown") move("down");

  if(k === 23 || k === 66 || e.key === "Enter"){
    play(TV.focused);
  }
});

window.onload = () => {
  const id = new URLSearchParams(location.search).get("id");
  if(id){
    const index = surahs.findIndex(s => s.id === id);
    if(index >= 0) {
      TV.focused = index;
      play(index);
    }
  }
  updateFocus();
};

/* ================= MAGIC FLOATER DELEGATE ================= */
const icons = ["✨","⭐","🌟"];
for(let i=0; i<15; i++){
  const d = document.createElement("div");
  d.className = "magic";
  d.innerText = icons[Math.floor(Math.random()*3)];
  d.style.left = Math.random()*100+"vw";
  d.style.top = Math.random()*90+"vh";
  d.style.animationDelay = Math.random()*3+"s";
  document.body.appendChild(d);
}
</script>

</body>
</html>
