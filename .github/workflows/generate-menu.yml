name: Generate Prism Menu

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate menu.json
        run: node generate-menu.js

      - name: Commit updated menu.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Prism menu.json"
          file_pattern: menu.json
